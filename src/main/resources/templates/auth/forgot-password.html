<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>Forgot Password</title>
</head>

<body>
    <section>
        <div class="container py-5">
            <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
                <div class="col-md-5 col-lg-4">
                    <div class="card border-0 shadow-lg p-4 p-md-5 rounded-4">
                        <div class="text-center mb-4">
                            <div class="bg-primary-light d-inline-block p-3 rounded-circle mb-3">
                                <i class="fas fa-key fa-2x text-primary"></i>
                            </div>
                            <h2 class="fw-bold h3 mb-2">Forgot Password</h2>
                            <p class="text-muted small">Enter your email and we'll send you a new temporary password.
                            </p>
                        </div>

                        <div th:if="${message}" class="alert alert-success border-0 small py-3 mb-4 rounded-3"
                            th:text="${message}"></div>
                        <div th:if="${error}" class="alert alert-danger border-0 small py-3 mb-4 rounded-3"
                            th:text="${error}"></div>

                        <form th:action="@{/forgot-password}" method="post">
                            <div class="mb-4">
                                <label class="form-label fw-semibold small text-muted">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="fas fa-envelope text-muted"></i></span>
                                    <input type="email" name="email" class="form-control bg-light border-start-0 ps-0"
                                        required placeholder="your@email.com">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm mb-4">
                                Send New Password <i class="fas fa-paper-plane ms-2 small"></i>
                            </button>
                        </form>

                        <div class="text-center">
                            <a href="/login" class="text-decoration-none small fw-semibold text-primary">
                                <i class="fas fa-arrow-left me-2"></i> Back to Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
