<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>My Courses | Online LMS</title>
</head>

<body>
<section>
    <div class="container py-5">

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-1">My Courses</h3>
                <p class="text-muted small mb-0">Các khóa học đã được duyệt của bạn</p>
            </div>
            <a href="/courses"
               class="btn btn-outline-primary btn-sm rounded-pill px-4">
                <i class="fas fa-search me-1"></i> Browse More Courses
            </a>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(courses)}"
             class="card border-0 shadow-sm rounded-4 text-center py-5">
            <div class="card-body py-5">
                <i class="fas fa-book-open fa-3x text-muted opacity-50 mb-3 d-block"></i>
                <p class="text-muted mb-2">Bạn chưa có khóa học nào được duyệt.</p>
                <p class="text-muted small mb-3">Đăng ký khóa học và chờ admin duyệt để bắt đầu học.</p>
                <a href="/courses" class="btn btn-primary rounded-pill px-5">
                    Khám phá khóa học
                </a>
            </div>
        </div>

        <!-- Course Grid -->
        <div th:unless="${#lists.isEmpty(courses)}"
             class="row g-4">

            <div th:each="course : ${courses}" class="col-md-6 col-xl-4">
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100"
                     style="transition: box-shadow 0.2s ease;"
                     onmouseenter="this.style.boxShadow='0 8px 24px rgba(0,0,0,0.12)'"
                     onmouseleave="this.style.boxShadow=''">

                    <!-- Thumbnail -->
                    <div class="position-relative overflow-hidden" style="height: 180px;">
                        <img th:src="${course.courseThumbnail}"
                             th:alt="${course.courseTitle}"
                             class="w-100 h-100" style="object-fit: cover;"
                             onerror="this.src='https://picsum.photos/seed/fallback/400/180'">
                        <!-- Status badge -->
                        <span th:if="${!course.completed}"
                              class="position-absolute top-0 end-0 m-2 badge rounded-pill px-3 py-2"
                              style="background: rgba(99,102,241,0.9); font-size: .75rem;">
                            <i class="fas fa-play-circle me-1"></i> In Progress
                        </span>
                        <span th:if="${course.completed}"
                              class="position-absolute top-0 end-0 m-2 badge rounded-pill bg-success px-3 py-2"
                              style="font-size: .75rem;">
                            <i class="fas fa-check-circle me-1"></i> Completed
                        </span>
                    </div>

                    <div class="card-body d-flex flex-column p-4">
                        <!-- Course title -->
                        <h6 class="fw-bold mb-1 lh-sm" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;"
                            th:text="${course.courseTitle}">Course Title</h6>

                        <!-- Instructor -->
                        <p class="text-muted small mb-2" th:if="${course.instructorName != null}">
                            <i class="fas fa-user-tie me-1 opacity-50"></i>
                            <span th:text="${course.instructorName}"></span>
                        </p>

                        <!-- Enrolled date -->
                        <p class="text-muted" style="font-size: .75rem;">
                            <i class="fas fa-calendar-alt me-1 opacity-50"></i>
                            Enrolled:
                            <span th:text="${#temporals.format(course.enrollDate, 'dd/MM/yyyy')}">01/01/2025</span>
                        </p>

                        <!-- Progress -->
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <small class="text-muted">Progress</small>
                                <small class="fw-semibold"
                                       th:text="${#numbers.formatDecimal(course.progress,1,2) + '%'}">0.00%</small>
                            </div>
                            <div class="progress rounded-pill" style="height: 6px; background: #e2e8f0;">
                                <div class="progress-bar rounded-pill"
                                     role="progressbar"
                                     th:style="'width:' + ${course.progressInt} + '%'"
                                     style="background: linear-gradient(90deg, #6366f1, #8b5cf6); transition: width 1s ease;">
                                </div>
                            </div>
                        </div>

                        <!-- CTA Button -->
                        <div class="mt-auto">
                            <a th:href="@{/lesson-viewer/{id}(id=${course.enrollmentId})}"
                               class="btn btn-primary w-100 rounded-pill"
                               style="background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none;">
                                <i class="fas fa-play-circle me-2"></i>
                                <span th:text="${course.progressInt == 0 ? 'Bắt đầu học' :
                                               (course.completed ? 'Xem lại' : 'Tiếp tục học')}">Bắt đầu học</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
        <!-- /grid -->

    </div>
</section>

<!-- Animate progress bars -->
<script th:inline="none">
    document.addEventListener("DOMContentLoaded", function() {
        document.querySelectorAll(".progress-bar").forEach(function(bar) {
            var target = bar.style.width;
            bar.style.width = "0";
            setTimeout(function() { bar.style.width = target; }, 100);
        });
    });
</script>
</body>
</html>
