<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>Sign In | Online LMS</title>
</head>

<body>
    <section>
        <div class="container">
            <div class="row justify-content-center py-5">
                <div class="col-md-6 col-lg-5">
                    <div class="card border-0 shadow-lg p-4 p-md-5 rounded-4 bg-white">
                        <div class="text-center mb-5">
                            <h2 class="display-6 fw-bold mb-2">Welcome Back</h2>
                            <p class="text-muted">Enter your credentials to access your account</p>
                        </div>

                        <!-- Alerts -->
                        <div th:if="${param.error}" class="alert alert-danger border-0 rounded-3 small mb-4">
                            <i class="fas fa-exclamation-circle me-2"></i> Invalid email or password.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success border-0 rounded-3 small mb-4">
                            <i class="fas fa-check-circle me-2"></i> You have been successfully logged out.
                        </div>
                        <div th:if="${param.expired}" class="alert alert-warning border-0 rounded-3 small mb-4">
                            <i class="fas fa-clock me-2"></i> Your session has expired. Please login again.
                        </div>

                        <form th:action="@{/perform-login}" method="post">
                            <div class="mb-4">
                                <label class="form-label fw-semibold small text-uppercase tracking-wider">Email
                                    Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i
                                            class="far fa-envelope"></i></span>
                                    <input type="email" name="email" class="form-control border-start-0 ps-0"
                                        placeholder="name@example.com" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label
                                        class="form-label fw-semibold small text-uppercase tracking-wider mb-0">Password</label>
                                    <a href="/forgot-password"
                                        class="small text-decoration-none text-primary">Forgot?</a>
                                </div>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i
                                            class="fas fa-lock"></i></span>
                                    <input type="password" name="password" class="form-control border-start-0 ps-0"
                                        placeholder="••••••••" required>
                                </div>
                            </div>
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" name="remember-me" id="rememberMe">
                                <label class="form-check-label small text-muted" for="rememberMe text-muted">Keep me
                                    logged in</label>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 py-3 shadow-sm mb-4">Sign
                                In</button>
                        </form>

                        <div class="text-center mt-2">
                            <p class="text-muted small mb-0">Don't have an account? <a href="/register"
                                    class="fw-bold text-decoration-none text-primary">Sign up now</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
