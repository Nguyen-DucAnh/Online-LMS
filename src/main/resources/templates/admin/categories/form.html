<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title th:text="${category.id != null} ? 'Chỉnh sửa Danh mục | OLMS' : 'Tạo Danh mục | OLMS'">OLMS</title>
    <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
</head>

<body class="bg-light">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="topbar">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0 small">
                <li class="breadcrumb-item">
                    <a th:href="@{/admin/categories}" class="text-decoration-none text-muted">Danh mục</a>
                </li>
                <li class="breadcrumb-item active fw-600" th:text="${category.id != null} ? 'Chỉnh sửa' : 'Tạo mới'">Tạo
                    mới</li>
            </ol>
        </nav>
    </div>

    <main class="main">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div>
                <h4 class="page-title mb-1"
                    th:text="${category.id != null} ? '✏️ Chỉnh sửa Danh mục' : '➕ Tạo Danh mục mới'">
                </h4>
                <p class="text-muted small mb-0">Nhập thông tin danh mục dưới đây</p>
            </div>
            <a th:href="@{/admin/categories}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Quay lại danh sách
            </a>
        </div>

        <div class="card p-4 mx-auto" style="max-width: 800px;">
            <form th:action="@{/admin/categories/save}" th:object="${category}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" th:field="*{id}" />

                <div class="mb-4">
                    <label class="form-label fw-600">Tên danh mục <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{name}" required
                        placeholder="VD: Công nghệ thông tin, Kinh doanh..." />
                </div>

                <div class="mb-4">
                    <label class="form-label fw-600">Mô tả</label>
                    <textarea class="form-control" th:field="*{description}" rows="4"
                        placeholder="Nhập mô tả ngắn cho danh mục này..."></textarea>
                </div>

                <div class="mb-4">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="statusCheck" th:field="*{status}"
                            role="switch" />
                        <label class="form-check-label fw-600" for="statusCheck">Kích hoạt danh mục</label>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-purple px-5 fw-700">
                        <i class="fas fa-save me-2"></i>Lưu danh mục
                    </button>
                    <a th:href="@{/admin/categories}" class="btn btn-light px-4">Hủy</a>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
