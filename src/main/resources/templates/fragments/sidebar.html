<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
  <nav th:fragment="sidebar" class="sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      <a th:href="@{/admin/dashboard}">
        <i class="fas fa-play-circle" style="color:var(--purple);font-size:1.3rem;"></i>
        OL<span class="brand-accent">MS</span>
      </a>
    </div>

    <!-- Nav links -->
    <div class="sidebar-nav">

      <span class="nav-section">Tổng quan</span>
      <a th:href="@{/admin/dashboard}" class="nav-link" th:classappend="${currentPage == 'dashboard'} ? ' active' : ''">
        <i class="fas fa-chart-bar"></i> Dashboard
      </a>

      <span class="nav-section">Nội dung</span>
      <a th:href="@{/admin/courses}" class="nav-link" th:classappend="${currentPage == 'courses'} ? ' active' : ''">
        <i class="fas fa-book-open"></i> Khóa học
      </a>
      <a th:href="@{/admin/categories}" class="nav-link"
        th:classappend="${currentPage == 'categories'} ? ' active' : ''">
        <i class="fas fa-tags"></i> Danh mục
      </a>
      <a th:href="@{/admin/posts}" class="nav-link" th:classappend="${currentPage == 'posts'} ? ' active' : ''">
        <i class="fas fa-newspaper"></i> Bài đăng
      </a>

      <span class="nav-section" sec:authorize="hasRole('ADMIN')">Quản trị</span>
      <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/users}" class="nav-link"
        th:classappend="${currentPage == 'users'} ? ' active' : ''">
        <i class="fas fa-users"></i> Người dùng
      </a>
      <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/settings}" class="nav-link"
        th:classappend="${currentPage == 'settings'} ? ' active' : ''">
        <i class="fas fa-sliders"></i> Cài đặt
      </a>

      <span class="nav-section">Tài khoản</span>
      <a th:href="@{/user/profile}" class="nav-link">
        <i class="fas fa-user-circle"></i> Hồ sơ
      </a>
      <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="nav-link btn btn-link border-0 w-100 text-start p-0"
          style="color:#ef4444; padding:.6rem 1.4rem !important;">
          <i class="fas fa-right-from-bracket"></i> Đăng xuất
        </button>
      </form>

    </div>
  </nav>
</body>

</html>
