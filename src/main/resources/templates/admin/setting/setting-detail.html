<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Setting Detail | OLMS</title>
    <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
    <style>
        :root { --sidebar-width: 250px; }
        .topbar, .main-content { margin-left: var(--sidebar-width); }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="topbar px-4 py-3 d-flex align-items-center">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0 small">
            <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Home</a></li>
            <li class="breadcrumb-item"><a th:href="@{/admin/settings}">Setting List</a></li>
            <li class="breadcrumb-item active fw-600" th:text="${setting.id == null ? 'New Setting' : 'Edit Setting'}"></li>
        </ol>
    </nav>
</div>

<main class="main-content">
    <div class="p-4">
        <div class="card border-0 shadow-sm rounded-4" style="max-width: 850px;">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-4 text-dark border-bottom pb-3"
                    th:text="${setting.id == null ? 'Create New Setting' : 'Edit Setting Info'}"></h4>

                <form th:action="@{/admin/settings/save}" th:object="${setting}" method="post" class="row g-4">
                    <input type="hidden" th:field="*{id}">

                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Setting Name <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{name}" class="form-control rounded-3 shadow-none" required maxlength="20">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Setting Type</label>
                        <select th:field="*{type.id}" class="form-select rounded-3 shadow-none">
                            <option value="">-- None (Master Type) --</option>
                            <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.name}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Value</label>
                        <input type="text" th:field="*{value}" class="form-control rounded-3 shadow-none" maxlength="100">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label small fw-bold">Priority</label>
                        <input type="number" th:field="*{priority}" class="form-control rounded-3 shadow-none" min="1">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label small fw-bold">Status</label>
                        <select th:field="*{status}" class="form-select rounded-3 shadow-none">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label small fw-bold">Description</label>
                        <textarea th:field="*{description}" class="form-control rounded-3 shadow-none" rows="3" maxlength="200"></textarea>
                    </div>

                    <div class="col-12 mt-5 border-top pt-4">
                        <button type="submit" class="btn btn-primary px-5 rounded-pill shadow-sm">
                            <i class="fas fa-save me-2"></i> Save Changes
                        </button>
                        <a th:href="@{/admin/settings}" class="btn btn-light px-4 rounded-pill border ms-2 shadow-sm">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
