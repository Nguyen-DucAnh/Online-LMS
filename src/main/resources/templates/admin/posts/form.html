<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title th:text="${postForm.id != null} ? 'Chỉnh sửa Bài đăng | OLMS' : 'Tạo Bài đăng | OLMS'">OLMS</title>
  <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
</head>
<body class="bg-light">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="topbar">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb mb-0 small">
      <li class="breadcrumb-item">
        <a th:href="@{/admin/posts}" class="text-decoration-none text-muted">Bài đăng</a>
      </li>
      <li class="breadcrumb-item active fw-600" th:text="${postForm.id != null} ? 'Chỉnh sửa' : 'Tạo mới'"></li>
    </ol>
  </nav>
</div>

<main class="main">

  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h4 class="page-title mb-1" th:text="${postForm.id != null} ? '✏️ Chỉnh sửa Bài đăng' : '➕ Tạo Bài đăng mới'"></h4>
      <p class="text-muted small mb-0">Điền đầy đủ thông tin và lưu</p>
    </div>
    <a th:href="@{/admin/posts}" class="btn btn-outline-secondary">
      <i class="fas fa-arrow-left me-2"></i>Quay lại danh sách
    </a>
  </div>

  <form th:action="${postForm.id != null}
                    ? @{/admin/posts/{id}/update(id=${postForm.id})}
                    : @{/admin/posts/save}"
        th:object="${postForm}" method="post">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" th:field="*{id}"/>

    <div class="row g-4">

      <div class="col-lg-8">
        <div class="card p-4 mb-4">
          <h6 class="fw-700 mb-3 d-flex align-items-center gap-2" style="color:var(--dark);">
            <i class="fas fa-info-circle" style="color:var(--purple);"></i> Thông tin cơ bản
          </h6>

          <div class="mb-3">
            <label class="form-label">Tiêu đề <span class="text-danger">*</span></label>
            <input type="text" class="form-control" th:field="*{title}"
                   placeholder="VD: Hướng dẫn Spring Boot..."
                   th:classappend="${#fields.hasErrors('title')} ? ' is-invalid' : ''"/>
            <div class="invalid-feedback" th:errors="*{title}"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Mô tả ngắn</label>
            <textarea class="form-control" rows="3" th:field="*{briefInfo}"
                      placeholder="Tóm tắt bài viết..."
                      th:classappend="${#fields.hasErrors('briefInfo')} ? ' is-invalid' : ''"></textarea>
            <div class="invalid-feedback" th:errors="*{briefInfo}"></div>
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Danh mục <span class="text-danger">*</span></label>
              <select class="form-select" th:field="*{categoryId}"
                      th:classappend="${#fields.hasErrors('categoryId')} ? ' is-invalid' : ''">
                <option value="">— Chọn danh mục —</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
              </select>
              <div class="invalid-feedback" th:errors="*{categoryId}"></div>
            </div>

            <div class="col-md-6" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
              <label class="form-label">Trạng thái</label>
              <select class="form-select" th:field="*{status}">
                <option th:each="s : ${postStatuses}" th:value="${s}" th:text="${s.name()}"></option>
              </select>
            </div>

            <div class="col-md-6" sec:authorize="hasRole('MARKETING')">
              <label class="form-label">Trạng thái</label>
              <input type="text" class="form-control" th:value="${postForm.status != null ? postForm.status.name() : 'DRAFT'}" disabled/>
            </div>
          </div>

        </div>

        <div class="card p-4">
          <h6 class="fw-700 mb-3 d-flex align-items-center gap-2" style="color:var(--dark);">
            <i class="fas fa-align-left" style="color:var(--purple);"></i> Nội dung
          </h6>

          <textarea class="form-control" rows="10" th:field="*{content}"
                    placeholder="Nhập nội dung bài viết..."
                    th:classappend="${#fields.hasErrors('content')} ? ' is-invalid' : ''"></textarea>
          <div class="invalid-feedback" th:errors="*{content}"></div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card p-4 mb-4">
          <h6 class="fw-700 mb-3 d-flex align-items-center gap-2" style="color:var(--dark);">
            <i class="fas fa-image" style="color:var(--purple);"></i> Thumbnail
          </h6>

          <div class="mb-3">
            <label class="form-label">Link ảnh</label>
            <input type="text" class="form-control" th:field="*{thumbnail}"
                   placeholder="https://..."
                   th:classappend="${#fields.hasErrors('thumbnail')} ? ' is-invalid' : ''"/>
            <div class="invalid-feedback" th:errors="*{thumbnail}"></div>
          </div>

          <div class="border rounded p-2 bg-white" style="min-height:120px;">
            <img th:if="${postForm.thumbnail != null and !#strings.isEmpty(postForm.thumbnail)}"
                 th:src="${postForm.thumbnail}"
                 style="width:100%;height:180px;object-fit:cover;border-radius:6px;" alt="preview"/>
            <div th:unless="${postForm.thumbnail != null and !#strings.isEmpty(postForm.thumbnail)}"
                 class="text-muted small">Preview thumbnail sẽ hiển thị ở đây</div>
          </div>
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-purple">
            <i class="fas fa-save me-2"></i>Lưu
          </button>
        </div>

      </div>

    </div>
  </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
