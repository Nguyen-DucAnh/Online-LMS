<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User List | OLMS</title>
    <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>

    <style>
        :root {
            /* Thay đổi 250px bằng chiều rộng chính xác sidebar của bạn */
            --sidebar-width: 250px;
        }

        .topbar, .main-content {
            margin-left: var(--sidebar-width);
        }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="topbar d-flex justify-content-between align-items-center px-4 py-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0 small">
            <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Home</a></li>
            <li class="breadcrumb-item active fw-600">User List</li>
        </ol>
    </nav>
    <a th:href="@{/admin/dashboard}" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
        <i class="fas fa-arrow-left me-1"></i> Dashboard
    </a>
</div>

<main class="main-content">
    <div class="p-4">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0 text-dark">User Management</h4>
                    <a th:href="@{/admin/users/new}" class="btn btn-primary px-4 rounded-pill shadow-sm">
                        <i class="fas fa-plus me-2"></i>Add User
                    </a>
                </div>

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-3" role="alert">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <form th:action="@{/admin/users}" method="get" class="row g-2 mb-4">
                    <div class="col-md-3">
                        <select name="role" class="form-select shadow-none rounded-3">
                            <option value="">All Roles</option>
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${r == selectedRole}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select name="status" class="form-select shadow-none rounded-3">
                            <option value="">All Statuses</option>
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == selectedStatus}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="keyword" class="form-control shadow-none rounded-3" placeholder="Search by name or email..." th:value="${keyword}">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-secondary w-100 shadow-none rounded-3">Search</button>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="bg-light">
                        <tr class="small text-uppercase fw-bold text-secondary">
                            <th class="border-0 ps-3">User Info</th>
                            <th class="border-0">Role</th>
                            <th class="border-0">Status</th>
                            <th class="border-0 text-end pe-3">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${userPage.content}">
                            <td class="ps-3">
                                <div class="fw-bold text-dark" th:text="${u.fullName}"></div>
                                <div class="text-muted small" th:text="${u.email}"></div>
                            </td>
                            <td>
                                <span class="badge rounded-pill bg-purple-light text-purple px-3" th:text="${u.role}"></span>
                            </td>
                            <td>
                                <span th:classappend="${u.status.name() == 'ACTIVE' ? 'badge bg-success-subtle text-success' : 'badge bg-secondary-subtle text-secondary'}"
                                      class="badge rounded-pill px-3" th:text="${u.status}"></span>
                            </td>
                            <td class="text-end pe-3">
                                <a th:href="@{/admin/users/edit/{id}(id=${u.id})}" class="btn btn-sm btn-light rounded-circle text-primary me-2 shadow-sm" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/admin/users/toggle/{id}(id=${u.id})}" class="btn btn-sm btn-light rounded-circle shadow-sm me-2" title="Toggle Status">
                                    <i class="fas" th:classappend="${u.status.name() == 'ACTIVE' ? 'fa-ban text-warning' : 'fa-check text-success'}"></i>
                                </a>
                                <button type="button" class="btn btn-sm btn-light rounded-circle text-danger shadow-sm"
                                        title="Delete"
                                        data-bs-toggle="modal"
                                        data-bs-target="#deleteConfirmModal"
                                        th:data-userid="${u.id}"
                                        th:data-username="${u.fullName}"
                                        onclick="setDeleteData(this)">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>
                        <tr th:if="${userPage.empty}">
                            <td colspan="4" class="text-center text-muted py-4">No users found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div th:if="${userPage.totalPages > 1}" class="d-flex justify-content-end mt-4">
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${userPage.first ? 'disabled' : ''}">
                            <a class="page-link shadow-none" th:href="@{/admin/users(page=${userPage.number - 1}, role=${selectedRole}, status=${selectedStatus}, keyword=${keyword})}">Previous</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, userPage.totalPages - 1)}" th:classappend="${userPage.number == i ? 'active' : ''}">
                            <a class="page-link shadow-none" th:href="@{/admin/users(page=${i}, role=${selectedRole}, status=${selectedStatus}, keyword=${keyword})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${userPage.last ? 'disabled' : ''}">
                            <a class="page-link shadow-none" th:href="@{/admin/users(page=${userPage.number + 1}, role=${selectedRole}, status=${selectedStatus}, keyword=${keyword})}">Next</a>
                        </li>
                    </ul>
                </div>

            </div>
        </div>
    </div>
</main>

<div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-labelledby="deleteConfirmModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title fw-bold text-danger" id="deleteConfirmModalLabel">
                    <i class="fas fa-exclamation-triangle me-2"></i>Confirm Deletion
                </h5>
                <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body py-4">
                Are you sure you want to delete the user <strong id="deleteUserName" class="text-dark"></strong>?<br>
                <span class="text-muted small mt-2 d-inline-block">
                    <em>Note: Only new users who have not made any transactions in the system can be deleted.</em>
                </span>
            </div>
            <div class="modal-footer border-top-0 pt-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                <a href="#" id="confirmDeleteBtn" class="btn btn-danger rounded-pill px-4">Yes, Delete!</a>
            </div>
        </div>
    </div>
</div>

<script>
    function setDeleteData(button) {

        var userId = button.getAttribute('data-userid');
        var userName = button.getAttribute('data-username');


        document.getElementById('deleteUserName').textContent = userName;

        document.getElementById('confirmDeleteBtn').href = '/admin/users/delete/' + userId;
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
