<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Quản lý Danh mục | OLMS</title>
    <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
</head>

<body class="bg-light">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="topbar">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0 small">
                <li class="breadcrumb-item">
                    <a th:href="@{/admin/dashboard}" class="text-decoration-none text-muted">Admin</a>
                </li>
                <li class="breadcrumb-item active fw-600">Danh mục</li>
            </ol>
        </nav>
        <div class="dropdown">
            <button class="btn btn-sm d-flex align-items-center gap-2 border-0" data-bs-toggle="dropdown">
                <div class="rounded-circle d-flex align-items-center justify-content-center text-white"
                    style="width:32px;height:32px;background:var(--purple);font-size:.75rem;">
                    <i class="fas fa-user"></i>
                </div>
                <span class="fw-600 d-none d-md-inline" sec:authentication="name">Admin</span>
                <i class="fas fa-chevron-down text-muted" style="font-size:.65rem;"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                <li><a class="dropdown-item" th:href="@{/user/profile}"><i class="fas fa-user me-2 text-muted"></i>Hồ
                        sơ</a></li>
                <li>
                    <hr class="dropdown-divider" />
                </li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="dropdown-item text-danger">
                            <i class="fas fa-sign-out-alt me-2"></i>Đăng xuất
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>

    <main class="main">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex align-items-start justify-content-between mb-4">
            <div>
                <h4 class="page-title mb-1">
                    <i class="fas fa-tags me-2" style="color:var(--purple);"></i>Quản lý Danh mục
                </h4>
                <p class="text-muted small mb-0">Thêm, sửa và xóa các danh mục khóa học</p>
            </div>
            <a th:href="@{/admin/categories/new}" class="btn btn-purple px-4">
                <i class="fas fa-plus me-2"></i>Thêm danh mục
            </a>
        </div>

        <div class="card table-card">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th style="width: 80px;">ID</th>
                            <th>Tên danh mục</th>
                            <th>Mô tả</th>
                            <th>Trạng thái</th>
                            <th class="text-center" style="width: 150px;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${categories.isEmpty()}">
                            <td colspan="5" class="text-center py-5 text-muted">
                                <i class="fas fa-inbox fa-2x d-block mb-2" style="color:#d1d5db;"></i>
                                Chưa có danh mục nào. <a th:href="@{/admin/categories/new}">Tạo ngay?</a>
                            </td>
                        </tr>
                        <tr th:each="cat : ${categories}">
                            <td class="text-muted fw-600" th:text="${cat.id}"></td>
                            <td>
                                <div class="fw-600" th:text="${cat.name}">Category Name</div>
                            </td>
                            <td class="small text-muted" th:text="${cat.description}">Description</td>
                            <td>
                                <span th:if="${cat.status}" class="badge-pub">Active</span>
                                <span th:unless="${cat.status}" class="badge-unpub">Inactive</span>
                            </td>
                            <td>
                                <div class="d-flex justify-content-center gap-1">
                                    <a th:href="@{/admin/categories/{id}/edit(id=${cat.id})}"
                                        class="btn btn-sm btn-outline-secondary" title="Chỉnh sửa">
                                        <i class="fas fa-pen"></i>
                                    </a>
                                    <form th:action="@{/admin/categories/{id}/delete(id=${cat.id})}" method="post"
                                        class="d-inline"
                                        th:onsubmit="return confirm('Xóa danh mục \'' + ${cat.name} + '\'?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                            th:value="${_csrf.token}" />
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
