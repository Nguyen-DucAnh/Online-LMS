<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Setting List | OLMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .breadcrumb-item a { text-decoration: none; color: #6c757d; }
        .breadcrumb-item.active { color: #6f42c1; font-weight: bold; }
    </style>
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="breadcrumb-item active">Setting List</li>
            </ol>
        </nav>
        <a th:href="@{/admin/dashboard}" class="btn btn-sm btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
        </a>
    </div>

    <div class="card shadow-sm border-0 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0 fw-bold text-dark">Setting List</h3>
            <a th:href="@{/admin/settings/new}" class="btn btn-primary btn-sm">
                <i class="fas fa-plus me-1"></i> New Setting
            </a>
        </div>

        <form th:action="@{/admin/settings}" method="get" class="row g-2 mb-4">
            <div class="col-md-2">
                <select name="typeId" class="form-select form-select-sm">
                    <option value="">All Types</option>
                    <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.name}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <select name="status" class="form-select form-select-sm">
                    <option value="">All Statuses</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
            <div class="col-md-4">
                <input type="text" name="keyword" class="form-control form-control-sm" placeholder="Enter keyword(s) to search">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-secondary btn-sm px-4">Search</button>
            </div>
        </form>

        <table class="table table-bordered table-hover align-middle">
            <thead class="table-light small text-uppercase">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Type <i class="fas fa-sort-up"></i></th>
                <th>Value</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody class="small">
            <tr th:each="s : ${settings}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.name}" class="fw-bold"></td>
                <td th:text="${s.type?.name}"></td>
                <td th:text="${s.value}"></td>
                <td th:text="${s.priority}"></td>
                <td th:text="${s.status}"></td>
                <td>
                    <a th:href="@{/admin/settings/edit/{id}(id=${s.id})}" class="text-primary me-2 text-decoration-none">Edit</a>
                    <a th:href="@{/admin/settings/status/{id}(id=${s.id})}"
                       th:text="${s.status == 'Active' ? 'Deactivate' : 'Activate'}"
                       class="text-decoration-none" th:classappend="${s.status == 'Active' ? 'text-danger' : 'text-success'}"></a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
