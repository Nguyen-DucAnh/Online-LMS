<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>My Enrollments | Online LMS</title>
</head>

<body>
<section>
    <div class="container py-5">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-1">My Enrollments</h3>
                <p class="text-muted small mb-0">Danh sách tất cả đăng ký khóa học của bạn</p>
            </div>
            <a th:href="@{/courses}" class="btn btn-outline-primary btn-sm rounded-pill px-4">
                <i class="fas fa-plus me-1"></i> Browse Courses
            </a>
        </div>

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Table Card -->
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4 py-3 fw-semibold text-muted small">Id</th>
                        <th class="py-3 fw-semibold text-muted small">Course</th>
                        <th class="py-3 fw-semibold text-muted small">User Info</th>
                        <th class="py-3 fw-semibold text-muted small">Enrolled At</th>
                        <th class="py-3 fw-semibold text-muted small">Fee($)</th>
                        <th class="py-3 fw-semibold text-muted small">Status</th>
                        <th class="pe-4 py-3 fw-semibold text-muted small">Actions</th>
                    </tr>
                    </thead>
                    <tbody>

                    <!-- Empty state -->
                    <tr th:if="${#lists.isEmpty(enrollments)}">
                        <td colspan="7" class="text-center py-5">
                            <div class="py-4">
                                <i class="fas fa-clipboard-list fa-3x text-muted opacity-50 mb-3 d-block"></i>
                                <p class="text-muted mb-2">Bạn chưa có đăng ký khóa học nào.</p>
                                <a th:href="@{/courses}" class="btn btn-primary btn-sm rounded-pill px-4">
                                    Khám phá khóa học
                                </a>
                            </div>
                        </td>
                    </tr>

                    <!-- Data rows -->
                    <tr th:each="e : ${enrollments}">

                        <!-- Id -->
                        <td class="ps-4 text-muted small" th:text="${e.id}"></td>

                        <!-- Course -->
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <!-- Thumbnail nhỏ -->
                                <img th:src="${e.courseThumbnail != null ? e.courseThumbnail : 'https://picsum.photos/seed/fallback/60/40'}"
                                     class="rounded-2 flex-shrink-0"
                                     style="width:60px;height:40px;object-fit:cover;"
                                     th:alt="${e.courseTitle}">
                                <a th:href="@{/courses/{id}(id=${e.courseId})}"
                                   th:text="${e.courseTitle}"
                                   class="text-decoration-none fw-semibold text-dark small"></a>
                            </div>
                        </td>

                        <!-- User Info: fullName + email trong 1 ô (khớp ảnh UI mẫu) -->
                        <td>
                            <div class="fw-medium small" th:text="${e.fullName}"></div>
                            <div class="text-muted smaller" th:text="${e.email}"></div>
                        </td>

                        <!-- Enrolled At -->
                        <td class="small text-muted"
                            th:text="${#temporals.format(e.enrollDate, 'yyyy-MM-dd HH:mm:ss')}"></td>

                        <!-- Fee($) -->
                        <td class="fw-semibold small">
                            <span th:text="${e.fee != null ? e.fee.setScale(2) : '0.00'}"></span>
                        </td>

                        <!-- Status badge -->
                        <td>
                            <!-- PENDING -->
                            <span th:if="${e.status.name() == 'PENDING'}"
                                  class="badge bg-warning text-dark px-2 py-1 rounded-pill small">
                                    Pending
                                </span>
                            <!-- APPROVED -->
                            <span th:if="${e.status.name() == 'APPROVED'}"
                                  class="badge bg-success px-2 py-1 rounded-pill small">
                                    Paid
                                </span>
                            <!-- REJECTED -->
                            <span th:if="${e.status.name() == 'REJECTED'}"
                                  class="badge bg-danger px-2 py-1 rounded-pill small">
                                    Rejected
                                </span>
                            <!-- CANCELLED -->
                            <span th:if="${e.status.name() == 'CANCELLED'}"
                                  class="badge bg-secondary px-2 py-1 rounded-pill small">
                                    Cancelled
                                </span>
                        </td>

                        <!-- Actions (khớp ảnh UI: Update / Access / View) -->
                        <td class="pe-4">
                            <!-- APPROVED → "Access" -->
                            <a th:if="${e.status.name() == 'APPROVED'}"
                               th:href="@{/courses/{id}(id=${e.courseId})}"
                               class="text-success fw-semibold small text-decoration-none">
                                Access
                            </a>

                            <!-- PENDING → "Update" -->
                            <a th:if="${e.status.name() == 'PENDING'}"
                               th:href="@{/enroll/{courseId}(courseId=${e.courseId})}"
                               class="text-primary fw-semibold small text-decoration-none">
                                Update
                            </a>

                            <!-- REJECTED → "Update" + tooltip lý do từ chối -->
                            <span th:if="${e.status.name() == 'REJECTED'}">
                                    <a th:href="@{/enroll/{courseId}(courseId=${e.courseId})}"
                                       class="text-primary fw-semibold small text-decoration-none me-2">
                                        Update
                                    </a>
                                <!-- Hiện lý do từ chối nếu có -->
                                    <span th:if="${e.rejectedNotes != null}"
                                          class="text-danger smaller"
                                          th:title="${e.rejectedNotes}">
                                        <i class="fas fa-info-circle"></i>
                                    </span>
                                </span>

                            <!-- CANCELLED → "View" -->
                            <a th:if="${e.status.name() == 'CANCELLED'}"
                               th:href="@{/my-enrollments}"
                               class="text-secondary fw-semibold small text-decoration-none">
                                View
                            </a>
                        </td>

                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <!-- End Table Card -->

    </div>
</section>
</body>
</html>
