<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Lỗi | OLMS</title>
    <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .error-code {
            font-size: 5rem;
            font-weight: 800;
            color: var(--purple, #8b5cf6);
            line-height: 1;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body class="bg-light">
    <div class="error-container">
        <div class="card p-5 shadow-lg border-0 rounded-4" style="max-width: 600px;">
            <div class="error-code">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3 class="fw-700 mb-3">Đã xảy ra lỗi</h3>
            <p class="text-muted mb-4" th:text="${message} ?: 'Đã xảy ra lỗi không mong muốn. Vui lòng thử lại sau.'">
                Đã xảy ra lỗi không mong muốn.
            </p>
            <div th:if="${status}" class="text-muted small mb-4">
                Mã lỗi: <span th:text="${status}"></span>
                <br> Exception: <span th:text="${error}"></span>
                <br> Detail: <span th:text="${message}"></span>
                <br> Trace: <pre th:text="${trace}" style="text-align:left; font-size:10px; max-height:200px; overflow:auto;"></pre>
            </div>
            <a th:href="@{/}" class="btn btn-outline-secondary px-4 py-2 fw-600">
                <i class="fas fa-home me-2"></i>Về trang chủ
            </a>
        </div>
    </div>
</body>

</html>
