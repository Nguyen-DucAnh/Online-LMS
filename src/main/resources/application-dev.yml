server:
  port: 8080
  tomcat:
    max-http-form-post-size: 500MB
    max-swallow-size: 500MB
  error:
    include-message: always
    include-stacktrace: always
    include-exception: true

spring:
  web:
    tomcat:
      max-http-form-post-size: 500MB
      max-swallow-size: 500MB
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
    error:
      include-message: always
      include-stacktrace: always
      include-exception: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://DUCANH:1433;databaseName=HSP_Project;encrypt=true;trustServerCertificate=true}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:sa}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

  thymeleaf:
    cache: false

