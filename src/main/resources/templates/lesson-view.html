<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${currentLesson.title + ' | ' + course.title}">Lesson View</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #0d6efd;
            --light-purple: #e7f1ff;
            --dark-bg: #1c1d1f;
            --dark-text: #1c1d1f;
            --gray-text: #6a6f73;
            --light-bg: #f7f9fa;
            --border-color: #d1d7dc;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--light-bg);
            color: var(--dark-text);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        .layout-container {
            display: flex;
            height: 100vh;
        }
        
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--dark-bg);
            overflow: hidden;
        }
        
        .content-header {
            padding: 1rem 1.5rem;
            background: var(--dark-bg);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .content-header h5 {
            color: #fff;
            margin: 0;
            font-weight: 600;
        }
        
        .video-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            position: relative;
            overflow-y: auto;
        }
        
        .video-player-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .video-player-wrapper iframe, .video-player-wrapper video {
            width: 100%;
            height: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .content-tabs {
            background: var(--dark-bg);
            padding: 1rem 1.5rem;
            border-top: 1px solid #333;
        }
        
        .curriculum-sidebar {
            width: 400px;
            background: #fff;
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }
        
        .sidebar-header h5 {
            margin: 0;
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .curriculum-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        
        .lesson-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            text-decoration: none;
            color: var(--dark-text);
            transition: all 0.15s;
            gap: 0.75rem;
        }
        
        .lesson-item:hover {
            background-color: var(--light-bg);
            color: var(--dark-text);
        }
        
        .lesson-item.active {
            background-color: var(--light-purple);
            border-left: 3px solid var(--primary-purple);
        }
        
        .lesson-info {
            flex: 1;
            min-width: 0;
        }
        
        .lesson-title {
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .active .lesson-title {
            font-weight: 600;
        }

        .lesson-meta {
            font-size: 0.8rem;
            color: var(--gray-text);
            margin-top: 0.25rem;
        }
        
        .back-link {
            color: #ccc;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #fff;
        }
        
        .accordion-button {
            font-weight: 700;
            background-color: #f8f9fa;
            padding: 1rem 1.25rem;
        }
        
        .accordion-button:not(.collapsed) {
            color: var(--dark-text);
            background-color: #f8f9fa;
            box-shadow: none;
        }
        
        .accordion-button:focus {
            box-shadow: none;
        }
        
        .accordion-body {
            padding: 0;
        }
        
        .lesson-type-icon {
            color: var(--gray-text);
            width: 20px;
            text-align: center;
        }
        
        .content-tabs h3 {
            color: #fff;
            margin-bottom: 0.5rem;
        }
        
        .text-content-wrapper {
            background: #fff;
            border-radius: 8px;
            padding: 2rem;
            margin: 2rem auto;
            max-width: 800px;
            color: var(--dark-text);
        }
        
        @media (max-width: 991px) {
            .layout-container {
                flex-direction: column;
            }
            .curriculum-sidebar {
                width: 100%;
                height: 40vh;
                border-left: none;
                border-top: 1px solid var(--border-color);
            }
            .content-area {
                height: 60vh;
            }
        }
    </style>
</head>
<body>
    <div class="layout-container">
        <!-- Left Area: Video Content -->
        <div class="content-area">
            <!-- Header -->
            <div class="content-header">
                <div class="d-flex align-items-center">
                    <a th:href="@{/courses/{id}(id=${course.id})}" class="back-link me-4">
                        <i class="fas fa-arrow-left"></i> Back to Course
                    </a>
                    <h5 class="mb-0 d-none d-md-block" th:text="${course.title}">Course Title</h5>
                </div>
            </div>
            
            <!-- Video Area -->
            <div class="video-area">
                <!-- Video lesson -->
                <div th:if="${currentLesson.type != null and currentLesson.type.name() == 'VIDEO'}" class="video-player-wrapper">
                    <iframe th:if="${currentLesson.contentFilePath != null and currentLesson.contentFilePath.contains('youtube.com')}"
                            th:src="${currentLesson.contentFilePath.replace('watch?v=', 'embed/')}" 
                            frameborder="0" allowfullscreen></iframe>
                            
                    <video controls th:if="${currentLesson.contentFilePath != null and !currentLesson.contentFilePath.contains('youtube.com')}" 
                           th:src="${currentLesson.contentFilePath}">
                        Your browser does not support video playback.
                    </video>
                    
                    <div th:if="${currentLesson.contentFilePath == null or #strings.isEmpty(currentLesson.contentFilePath)}" class="text-center text-white p-5">
                        <i class="fas fa-exclamation-circle fa-3x mb-3 text-warning"></i>
                        <p>Video lesson does not have a valid source URL.</p>
                    </div>
                </div>

                <!-- PDF lesson -->
                <div th:if="${currentLesson.type != null and currentLesson.type.name() == 'PDF'}" class="video-player-wrapper bg-white">
                    <iframe th:if="${currentLesson.contentFilePath != null and !#strings.isEmpty(currentLesson.contentFilePath)}"
                            th:src="${currentLesson.contentFilePath}" 
                            frameborder="0"></iframe>
                            
                    <div th:if="${currentLesson.contentFilePath == null or #strings.isEmpty(currentLesson.contentFilePath)}" class="text-center p-5">
                        <i class="fas fa-file-pdf fa-3x mb-3 text-warning"></i>
                        <p>PDF lesson does not have a valid source URL.</p>
                    </div>
                </div>

                <!-- Text / rich content lesson description (Shown for any lesson type if content exists) -->
                <div th:if="${currentLesson.content != null and !#strings.isEmpty(currentLesson.content)}">
                    <div class="text-content-wrapper shadow text-dark mt-4" style="max-width: 95%;">
                        <div class="lh-lg" th:utext="${currentLesson.content}">
                            Lesson content goes here...
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Bottom Tabs / Info -->
            <div class="content-tabs d-flex justify-content-between align-items-center flex-wrap">
                <div>
                    <h3 class="fw-bold fs-5 mb-1" th:text="${currentLesson.title}">Lesson Title</h3>
                    <div class="text-secondary small">
                        <span class="badge bg-primary me-2" th:text="${currentLesson.type}">VIDEO</span>
                        <i class="fas fa-clock me-1"></i> 
                        <span th:text="${currentLesson.duration != null ? currentLesson.duration + ' mins' : 'N/A'}">15 mins</span>
                    </div>
                </div>
                
                <div class="d-flex gap-2 mt-3 mt-md-0">
                    <a href="#" class="btn btn-outline-light disabled"><i class="fas fa-chevron-left me-2"></i>Previous</a>
                    <a href="#" class="btn btn-primary">Next Lesson <i class="fas fa-chevron-right ms-2"></i></a>
                </div>
            </div>
        </div>

        <!-- Right Curriculum Sidebar -->
        <div class="curriculum-sidebar">
            <div class="sidebar-header">
                <h5>Course Curriculum</h5>
            </div>
            
            <div class="curriculum-list">
                <div class="accordion accordion-flush" id="lessonAccordion">
                    <div th:each="chapter, chStat : ${chapters}" class="accordion-item border-0">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button"
                                th:data-bs-target="'#ch-' + ${chapter.id}" data-bs-toggle="collapse"
                                th:aria-expanded="${#lists.contains(chapter.lessons.![id], currentLesson.id) ? 'true' : 'false'}"
                                th:classappend="${#lists.contains(chapter.lessons.![id], currentLesson.id) ? '' : 'collapsed'}">
                                <span class="me-2 fw-bold text-muted" th:text="${'Ch' + (chStat.index + 1)}">Ch1</span>
                                <span th:text="${chapter.title}">Chapter Title</span>
                            </button>
                        </h2>
                        <div th:id="'ch-' + ${chapter.id}" class="accordion-collapse collapse"
                            th:classappend="${#lists.contains(chapter.lessons.![id], currentLesson.id) ? 'show' : ''}"
                            data-bs-parent="#lessonAccordion">
                            <div class="accordion-body border-bottom border-top">
                                <a th:each="lesson : ${chapter.lessons}"
                                    th:href="@{/courses/{cId}/lessons/{lId}(cId=${course.id}, lId=${lesson.id})}"
                                    class="lesson-item"
                                    th:classappend="${lesson.id == currentLesson.id} ? 'active' : ''">
                                    
                                    <div class="lesson-type-icon">
                                        <i class="fas fa-play-circle" th:if="${lesson.type == null or lesson.type.name() == 'VIDEO'}"></i>
                                        <i class="fas fa-file-pdf" th:if="${lesson.type != null and lesson.type.name() == 'PDF'}"></i>
                                        <i class="fas fa-file-alt" th:if="${lesson.type != null and lesson.type.name() == 'TEXT'}"></i>
                                    </div>
                                    
                                    <div class="lesson-info">
                                        <div class="lesson-title" th:text="${lesson.title}">Lesson Title</div>
                                        <div class="lesson-meta" th:if="${lesson.duration != null}">
                                            <i class="fas fa-clock fs-xs"></i> <span th:text="${lesson.duration} + ' min'"></span>
                                        </div>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
