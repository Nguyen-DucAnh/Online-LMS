<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>404 - Not Found | OLMS</title>
    <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--purple);
            line-height: 1;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body class="bg-light">
    <div class="error-container">
        <div class="card p-5 shadow-lg border-0 rounded-4" style="max-width: 500px;">
            <div class="error-code">404</div>
            <h3 class="fw-700 mb-3">Page Not Found</h3>
            <p class="text-muted mb-4">
                Oops! The page you are looking for doesn't exist or has been moved.
                <br />
                <small class="text-secondary" th:text="${'Path: ' + #request.getRequestURI()}"></small>
            </p>
            <a th:href="@{/}" class="btn btn-purple px-4 py-2 fw-600">
                <i class="fas fa-home me-2"></i>Back to Home
            </a>
        </div>
    </div>
</body>

</html>
