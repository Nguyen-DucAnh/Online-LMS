<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>Verify OTP</title>
</head>

<body>
    <section>
        <div class="container py-5">
            <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
                <div class="col-md-5 col-lg-4">
                    <div class="card border-0 shadow-lg p-4 p-md-5 rounded-4 text-center">
                        <div class="mb-4">
                            <div class="bg-primary-light d-inline-block p-3 rounded-circle mb-3">
                                <i class="fas fa-shield-alt fa-2x text-primary"></i>
                            </div>
                            <h2 class="fw-bold h3 mb-2">Verify Account</h2>
                            <p class="text-muted small">We've sent a 6-digit verification code to your email address.
                            </p>
                        </div>

                        <div th:if="${message}" class="alert alert-success border-0 small py-3 mb-4 rounded-3"
                            th:text="${message}"></div>
                        <div th:if="${error}" class="alert alert-danger border-0 small py-3 mb-4 rounded-3"
                            th:text="${error}"></div>

                        <form th:action="@{/verify-otp}" th:object="${otpRequest}" method="post" class="text-start">
                            <div class="mb-3">
                                <label class="form-label fw-semibold small text-muted">Email</label>
                                <input type="email" th:field="*{email}"
                                    class="form-control bg-light border-0 shadow-none" readonly>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold small text-muted">Verification Code</label>
                                <input type="text" th:field="*{otp}"
                                    class="form-control form-control-lg text-center fw-bold letter-spacing-2" required
                                    placeholder="000000" maxlength="6">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm mb-4">
                                Verify & Activate <i class="fas fa-check-circle ms-2 small"></i>
                            </button>
                        </form>

                        <div class="text-center">
                            <p class="text-muted small mb-0">Didn't receive the code?</p>
                            <a th:href="@{/resend-otp(email=${otpRequest.email})}"
                                class="text-decoration-none small fw-semibold text-primary mt-1 d-inline-block">
                                <i class="fas fa-redo-alt me-1 smaller"></i> Resend Code
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
