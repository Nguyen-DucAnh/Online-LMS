<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="${lesson.id == null ? 'Add Lesson' : 'Edit Lesson'} + ' | OLMS'">Lesson Details</title>
    <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #333;
        }
        .main-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .lesson-card {
            border: 1px solid #ced4da;
            border-radius: 4px;
            background: #fff;
            box-shadow: none;
        }
        .card-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #eee;
        }
        .card-title {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 0;
            color: #212529;
        }
        .form-body {
            padding: 2rem;
        }
        .inner-card {
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1rem;
        }
        .form-label {
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            display: block;
        }
        .form-control, .form-select {
            border: 1px solid #ced4da;
            border-radius: 4px;
            padding: 0.5rem 0.75rem;
            font-size: 1rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #80bdff;
            outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25);
        }
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
            font-weight: 500;
            padding: 0.5rem 1.25rem;
        }
        .btn-secondary-custom {
            background-color: #6c757d;
            border-color: #6c757d;
            color: white;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
        }
        .btn-secondary-custom:hover {
            background-color: #5a6268;
            color: white;
        }
        .text-muted-help {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 0.25rem;
        }
        .upload-options {
            border: 1px dashed #dee2e6;
            background: #f8f9fa;
            border-radius: 4px;
            padding: 1rem;
            margin-top: 10px;
        }
        .row-spacing {
            margin-bottom: 1.5rem;
        }
        .form-check-label {
            font-weight: 500;
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="topbar py-2 px-4 bg-white border-bottom">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0 small">
            <li class="breadcrumb-item"><a th:href="@{/admin/courses}" class="text-decoration-none">Khóa học</a></li>
            <li class="breadcrumb-item"><a th:href="@{/admin/courses/{id}/content(id=${courseId})}" class="text-decoration-none" th:text="${course.title}">Course</a></li>
            <li class="breadcrumb-item active" th:text="${chapter.title}">Chapter</li>
        </ol>
    </nav>
</div>

<main class="main p-4">
    <div class="lesson-card shadow-sm">
        <div class="card-header-flex">
            <h1 class="card-title">
                <span th:text="${lesson.id == null ? 'Add Lesson' : 'Edit Lesson'}">Edit Lesson</span>
                <span th:text="' - ' + ${chapter.title}"> - Chương 2.1 - Tổng quan</span>
            </h1>
            <a th:href="@{/admin/courses/{id}/content(id=${courseId})}" class="btn-secondary-custom">
                <i class="fas fa-arrow-left me-2"></i>Back to Course
            </a>
        </div>

        <div class="form-body">
            <form th:action="${lesson.id == null} 
                            ? @{/admin/courses/{cid}/chapters/{chid}/lessons/new(cid=${courseId}, chid=${chapter.id})} 
                            : @{/admin/courses/{cid}/chapters/{chid}/lessons/{lid}/edit(cid=${courseId}, chid=${chapter.id}, lid=${lesson.id})}"
                  th:method="post" th:object="${lesson}" enctype="multipart/form-data">
                
                <!-- Errors -->
                <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger mb-4">
                    <ul class="mb-0">
                        <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                    </ul>
                </div>
                
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                
                <div class="inner-card">
                    <!-- Row 1: Title and Duration -->
                    <div class="row row-spacing">
                        <div class="col-md-9">
                            <label class="form-label">Lesson Title *</label>
                            <input type="text" class="form-control w-100" th:field="*{title}" required placeholder="VD: Bài học tổng quan 2.1.1"/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Duration (Minutes)</label>
                            <input type="number" class="form-control w-100" th:field="*{duration}" min="0"/>
                        </div>
                    </div>

                    <!-- Row 2: Content Type and Order -->
                    <div class="row row-spacing">
                        <div class="col-md-9">
                            <label class="form-label">Content Type *</label>
                            <select class="form-select w-100" th:field="*{type}" id="contentType">
                                <option value="VIDEO">Video</option>
                                <option value="PDF">PDF Document</option>
                                <option value="DOCX">Word Document</option>
                                <option value="IMAGE">Image/Photo</option>
                                <option value="TEXT">Text Content</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Order *</label>
                            <input type="number" class="form-control w-100" th:field="*{orderIndex}" min="1" required/>
                            <div class="text-muted-help">The order in which this lesson appears in the chapter</div>
                        </div>
                    </div>

                    <!-- Row 3: Video URL and Preview -->
                    <div class="row row-spacing">
                        <div class="col-md-9">
                            <label class="form-label" id="mainContentLabel">Content Video</label>
                            <input type="text" class="form-control w-100" th:field="*{contentFilePath}" 
                                   placeholder="YouTube URL or direct video file URL"/>
                            <div class="text-muted-help" id="mainHelpText">YouTube URL or direct video file URL</div>
                            
                            <!-- Hidden Upload Fields (Toggleable) -->
                            <div id="videoUploadBox" class="upload-options" style="display:none;">
                                <label class="small fw-bold">Hoặc tải lên file Video:</label>
                                <input type="file" name="videoFile" class="form-control form-control-sm mt-1" accept="video/*"/>
                            </div>
                            <div id="pdfUploadBox" class="upload-options" style="display:none;">
                                <label class="small fw-bold">Tải lên file PDF:</label>
                                <input type="file" name="pdfFile" class="form-control form-control-sm mt-1" accept="application/pdf"/>
                            </div>
                            <div id="docxUploadBox" class="upload-options" style="display:none;">
                                <label class="small fw-bold">Tải lên file Word:</label>
                                <input type="file" name="docxFile" class="form-control form-control-sm mt-1" accept=".docx"/>
                            </div>
                            <div id="imageUploadBox" class="upload-options" style="display:none;">
                                <label class="small fw-bold">Tải lên hình ảnh:</label>
                                <input type="file" name="imageFile" class="form-control form-control-sm mt-1" accept="image/*"/>
                            </div>
                        </div>
                        <div class="col-md-3 d-flex flex-column pt-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" th:field="*{previewEnabled}" id="previewEnabled"/>
                                <label class="form-check-label ms-2" for="previewEnabled">Preview Lesson</label>
                            </div>
                            <div class="text-muted-help ms-4">Preview lessons can be watched without enrollment</div>
                        </div>
                    </div>

                    <!-- Row 4: Text Content / Description -->
                    <div class="mb-0">
                        <label class="form-label">Lesson Content (Optional Description or Text)</label>
                        <textarea class="form-control w-100" rows="6" th:field="*{content}" 
                                  placeholder="Nhập nội dung bài học hoặc mô tả chi tiết..."></textarea>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="btn btn-primary btn-lg px-4 d-inline-flex align-items-center rounded-2">
                        <i class="fas fa-save me-2"></i>
                        <span th:text="${lesson.id == null ? 'Create Lesson' : 'Update Lesson'}">Update Lesson</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    (function() {
        var typeSelect = document.getElementById('contentType');
        var label = document.getElementById('mainContentLabel');
        var help = document.getElementById('mainHelpText');
        
        var boxes = {
            'VIDEO': document.getElementById('videoUploadBox'),
            'PDF': document.getElementById('pdfUploadBox'),
            'DOCX': document.getElementById('docxUploadBox'),
            'IMAGE': document.getElementById('imageUploadBox')
        };

        function toggle() {
            if (!typeSelect) return;
            var val = typeSelect.value;
            
            // Labels and Help
            if (val === 'VIDEO') {
                label.innerText = 'YouTube URL';
                help.innerText = 'Chỉ chấp nhận link YouTube URL (ví dụ: https://www.youtube.com/watch?v=...)';
            } else if (val === 'PDF') {
                label.innerText = 'Content Document (PDF)';
                help.innerText = 'URL to PDF (optional if uploading)';
            } else if (val === 'DOCX') {
                label.innerText = 'Content Document (Word)';
                help.innerText = 'URL to Document (optional if uploading)';
            } else if (val === 'IMAGE') {
                label.innerText = 'Content Image';
                help.innerText = 'URL to Image (optional if uploading)';
            } else {
                label.innerText = 'External Resource URL';
                help.innerText = 'Link to external content (optional)';
            }

            // Upload Boxes
            for (var key in boxes) {
                if (key === 'VIDEO') {
                    if (boxes[key]) boxes[key].style.display = 'none'; // Bỏ upload file cho Video
                } else {
                    if (boxes[key]) boxes[key].style.display = (key === val) ? 'block' : 'none';
                }
            }
        }

        if (typeSelect) {
            typeSelect.addEventListener('change', toggle);
            toggle();
        }
    })();
</script>
</body>
</html>
