<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${post.title} + ' | OLMS'">Blog Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    .sidebar-box{border:1px solid #e5e7eb;border-radius:10px;background:#fff;}
    .sidebar-title{background:#f3f4f6;border-bottom:1px solid #e5e7eb;padding:10px 12px;border-top-left-radius:10px;border-top-right-radius:10px;font-weight:700;}
    .comment-box{border:1px solid #e5e7eb;border-radius:10px;background:#fff;padding:14px;}
    .reply-box{margin-left:44px;border-left:3px solid #e5e7eb;padding-left:14px;}
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}">OLMS</a>
    <div class="ms-auto d-flex gap-2">
      <a class="btn btn-outline-primary" th:href="@{/login}" sec:authorize="isAnonymous()">Login</a>
      <a class="btn btn-primary" th:href="@{/register}" sec:authorize="isAnonymous()">Register</a>
      <a class="btn btn-outline-primary" th:href="@{/profile}" sec:authorize="isAuthenticated()">Profile</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="row g-4">

    <div class="col-lg-8">
      <div class="bg-white border rounded p-4">
        <h2 class="fw-bold mb-2" th:text="${post.title}"></h2>

        <div class="d-flex align-items-center gap-3 text-muted small mb-3">
          <span><i class="far fa-calendar me-1"></i><span th:text="${#temporals.format(post.createdAt,'dd/MM/yyyy')}"></span></span>
          <span><i class="fas fa-tag me-1"></i><span th:text="${post.category != null ? post.category.name : '—'}"></span></span>
          <span><i class="fas fa-user me-1"></i><span th:text="${post.author != null ? post.author.fullName : '—'}"></span></span>
        </div>

        <div class="mb-4" th:utext="${post.content}"></div>

        <h4 class="fw-bold text-primary">Discussions</h4>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
          <span th:text="${successMessage}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="mb-3" sec:authorize="isAuthenticated()">
          <form th:action="@{/blogs/{id}/comments(id=${post.id})}" method="post" th:object="${commentForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{parentId}" id="parentId"/>
            <div class="input-group">
              <input type="text" class="form-control" th:field="*{content}" placeholder="Write your discussion"/>
              <button class="btn btn-primary" type="submit">Send</button>
            </div>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
          </form>
          <div class="text-muted small mt-1" id="replyHint" style="display:none;">Bạn đang reply. <a href="#" onclick="clearReply(event)">Hủy</a></div>
        </div>

        <div class="mb-3" sec:authorize="isAnonymous()">
          <div class="alert alert-info mb-0">Bạn cần <a th:href="@{/login}">đăng nhập</a> để bình luận.</div>
        </div>

        <div class="d-flex flex-column gap-3 mt-3">

          <div th:each="c : ${comments}" class="comment-box">
            <div class="d-flex justify-content-between">
              <div class="fw-bold" th:text="${c.author != null ? c.author.fullName : '—'}"></div>
              <div class="text-muted small" th:text="${#temporals.format(c.createdAt,'dd/MM/yyyy HH:mm')}"></div>
            </div>
            <div class="mt-2" th:text="${c.content}"></div>

            <div class="mt-2 d-flex gap-2">
              <a href="#" class="small" sec:authorize="isAuthenticated()" th:attr="data-id=${c.id}" onclick="replyTo(event)">Reply</a>

              <form sec:authorize="isAuthenticated()" th:action="@{/blogs/comments/{id}/delete(id=${c.id})}" method="post" class="d-inline"
                    th:if="${currentUserId != null and (currentUserId == c.author.id)}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="postId" th:value="${post.id}"/>
                <button type="submit" class="btn btn-link p-0 small text-danger">Delete</button>
              </form>

              <form sec:authorize="hasAnyRole('ADMIN','MANAGER')" th:action="@{/blogs/comments/{id}/delete(id=${c.id})}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="postId" th:value="${post.id}"/>
                <button type="submit" class="btn btn-link p-0 small text-danger">Delete</button>
              </form>
            </div>

            <div class="mt-3 reply-box" th:if="${c.replies != null and !c.replies.isEmpty()}">
              <div th:each="r : ${c.replies}" class="mb-3">
                <div class="d-flex justify-content-between">
                  <div class="fw-bold" th:text="${r.author != null ? r.author.fullName : '—'}"></div>
                  <div class="text-muted small" th:text="${#temporals.format(r.createdAt,'dd/MM/yyyy HH:mm')}"></div>
                </div>
                <div class="mt-2" th:text="${r.content}"></div>

                <div class="mt-2 d-flex gap-2">
                  <form sec:authorize="isAuthenticated()" th:action="@{/blogs/comments/{id}/delete(id=${r.id})}" method="post" class="d-inline"
                        th:if="${currentUserId != null and (currentUserId == r.author.id)}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="postId" th:value="${post.id}"/>
                    <button type="submit" class="btn btn-link p-0 small text-danger">Delete</button>
                  </form>

                  <form sec:authorize="hasAnyRole('ADMIN','MANAGER')" th:action="@{/blogs/comments/{id}/delete(id=${r.id})}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="postId" th:value="${post.id}"/>
                    <button type="submit" class="btn btn-link p-0 small text-danger">Delete</button>
                  </form>
                </div>

              </div>
            </div>

          </div>

        </div>

      </div>
    </div>

    <div class="col-lg-4">

      <div class="sidebar-box mb-3">
        <div class="sidebar-title">Search Blog(s)</div>
        <div class="p-3">
          <form method="get" th:action="@{/blogs}">
            <input class="form-control" type="text" name="keyword" placeholder="Type keyword to search"/>
          </form>
        </div>
      </div>

      <div class="sidebar-box">
        <div class="sidebar-title">Blog Category</div>
        <div class="p-3">
          <div class="d-flex flex-column gap-2">
            <a class="text-decoration-none" th:href="@{/blogs}"><strong>All</strong></a>
            <a th:each="c : ${categories}" class="text-decoration-none" th:href="@{/blogs(categoryId=${c.id})}">
              <span th:text="${c.name}"></span>
            </a>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function replyTo(e){
    e.preventDefault();
    const id = e.currentTarget.getAttribute('data-id');
    document.getElementById('parentId').value = id;
    document.getElementById('replyHint').style.display = 'block';
    window.scrollTo({top: 0, behavior:'smooth'});
  }
  function clearReply(e){
    e.preventDefault();
    document.getElementById('parentId').value = '';
    document.getElementById('replyHint').style.display = 'none';
  }
</script>
</body>
</html>
