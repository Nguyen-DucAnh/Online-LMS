<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Setting List | OLMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .breadcrumb-item a { text-decoration: none; color: #6c757d; }
        .breadcrumb-item.active { color: #6f42c1; font-weight: bold; }
        .card { border-radius: 12px; }
    </style>
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="breadcrumb-item active">Setting List</li>
            </ol>
        </nav>
        <a th:href="@{/admin/dashboard}" class="btn btn-sm btn-outline-secondary shadow-sm">
            <i class="fas fa-arrow-left me-1"></i> Quay lại Dashboard
        </a>
    </div>

    <div class="card shadow-sm border-0 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0 fw-bold text-dark">System Settings</h3>
            <a th:href="@{/admin/settings/new}" class="btn btn-primary btn-sm px-3 shadow-sm">
                <i class="fas fa-plus me-1"></i> Thêm mới Setting
            </a>
        </div>

        <form th:action="@{/admin/settings}" method="get" class="row g-2 mb-4">
            <div class="col-md-3">
                <select name="typeId" class="form-select form-select-sm shadow-none">
                    <option value="">-- Tất cả các loại --</option>
                    <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.name}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <select name="status" class="form-select form-select-sm shadow-none">
                    <option value="">Tất cả trạng thái</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
            <div class="col-md-5">
                <input type="text" name="keyword" class="form-control form-control-sm shadow-none" placeholder="Tìm kiếm theo tên hoặc giá trị...">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-secondary btn-sm w-100">Tìm kiếm</button>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-light small text-uppercase">
                <tr>
                    <th>ID</th>
                    <th>Tên</th>
                    <th>Loại</th>
                    <th>Giá trị</th>
                    <th>Ưu tiên</th>
                    <th>Trạng thái</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>
                <tbody class="small">
                <tr th:each="s : ${settings}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.name}" class="fw-bold"></td>
                    <td th:text="${s.type?.name ?: 'Master'}"></td>
                    <td th:text="${s.value}"></td>
                    <td th:text="${s.priority}"></td>
                    <td>
                        <span th:classappend="${s.status == 'Active' ? 'badge bg-success-subtle text-success' : 'badge bg-secondary-subtle text-secondary'}"
                              th:text="${s.status}" class="px-2 py-1"></span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/admin/settings/edit/{id}(id=${s.id})}" class="btn btn-sm btn-link text-primary p-0 me-2 text-decoration-none">Sửa</a>

                        <a th:href="@{/admin/settings/status/{id}(id=${s.id})}"
                           onclick="return confirm('Bạn có chắc chắn muốn thay đổi trạng thái này?')"
                           th:text="${s.status == 'Active' ? 'Deactivate' : 'Activate'}"
                           class="btn btn-sm btn-link p-0 text-decoration-none"
                           th:classappend="${s.status == 'Active' ? 'text-danger' : 'text-success'}"></a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(settings.content)}">
                    <td colspan="7" class="text-center py-4 text-muted">Không tìm thấy dữ liệu nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
