<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User List | OLMS</title>
    <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
</head>
<body class="bg-light">
<!--<div th:replace="~{fragments/sidebar :: sidebar}"></div>-->

<div class="topbar d-flex justify-content-between align-items-center px-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0 small">
            <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Home</a></li>
            <li class="breadcrumb-item active fw-600">User List</li>
        </ol>
    </nav>
    <a th:href="@{/admin/dashboard}" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
        <i class="fas fa-arrow-left me-1"></i> Dashboard
    </a>
</div>

<main class="main-content">
    <div class="p-4">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0 text-dark">User Management</h4>
                    <a th:href="@{/admin/users/new}" class="btn btn-primary px-4 rounded-pill shadow-sm">
                        <i class="fas fa-plus me-2"></i>Add User
                    </a>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="bg-light">
                        <tr class="small text-uppercase fw-bold text-secondary">
                            <th class="border-0 ps-3">User Info</th>
                            <th class="border-0">Role</th>
                            <th class="border-0">Status</th>
                            <th class="border-0 text-end pe-3">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${users}">
                            <td class="ps-3">
                                <div class="fw-bold text-dark" th:text="${u.fullName}"></div>
                                <div class="text-muted small" th:text="${u.email}"></div>
                            </td>
                            <td>
                                <span class="badge rounded-pill bg-purple-light text-purple px-3" th:text="${u.role}"></span>
                            </td>
                            <td>
                                        <span th:classappend="${u.status.name() == 'ACTIVE' ? 'badge bg-success-subtle text-success' : 'badge bg-secondary-subtle text-secondary'}"
                                              class="badge rounded-pill px-3" th:text="${u.status}"></span>
                            </td>
                            <td class="text-end pe-3">
                                <a th:href="@{/admin/users/edit/{id}(id=${u.id})}" class="btn btn-sm btn-light rounded-circle text-primary me-2 shadow-sm">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/admin/users/toggle/{id}(id=${u.id})}" class="btn btn-sm btn-light rounded-circle shadow-sm">
                                    <i class="fas" th:classappend="${u.status.name() == 'ACTIVE' ? 'fa-ban text-danger' : 'fa-check text-success'}"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
