<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Enrollment Details | Online LMS</title>
    <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --purple: #6f42c1; --sidebar-width: 250px; }
        .main-content { margin-left: var(--sidebar-width); transition: all .3s; }
        .topbar { margin-left: var(--sidebar-width); padding: 12px 24px; background: #fff; border-bottom: 1px solid #eee;
                  display: flex; justify-content: space-between; align-items: center; }
        @media(max-width:768px){ .main-content,.topbar{ margin-left:0; } }
    </style>
</head>

<body class="bg-light">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="topbar shadow-sm">
    <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0 small">
        <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
        <li class="breadcrumb-item"><a th:href="@{/admin/enrollments}">Ghi danh</a></li>
        <li class="breadcrumb-item active fw-bold">Chi tiết</li>
    </ol></nav>
</div>

<main class="main-content p-4">


        <!-- Back button -->
        <div class="mb-3">
            <a th:href="@{/admin/enrollments}"
               class="text-decoration-none text-muted small">
                <i class="fas fa-arrow-left me-1"></i>Back to Enrollments
            </a>
        </div>

        <!-- ── Form card (khớp ảnh UI) ── -->
        <div class="card border shadow-sm">
            <div class="card-body p-4">

                <h5 class="fw-bold mb-4">Enrollment Details</h5>

                <!-- Flash -->
                <div th:if="${errorMessage}" class="alert alert-danger small py-2">
                    <span th:text="${errorMessage}"></span>
                </div>

                <form th:action="@{/admin/enrollments/save}"
                      th:object="${enrollmentForm}"
                      method="post">

                    <!-- Hidden id -->
                    <input type="hidden" th:field="*{id}">

                    <!-- Row 1: Course + Fee -->
                    <div class="row g-3 mb-3">
                        <div class="col-7">
                            <label class="form-label small fw-medium">Course *</label>
                            <!-- Edit mode: hiển thị tên course, không cho đổi -->
                            <div th:if="${enrollmentForm.id != null}">
                                <input type="text" class="form-control form-control-sm bg-light"
                                       th:value="${enrollmentForm.courseTitle}" readonly>
                                <input type="hidden" th:field="*{courseId}">
                            </div>
                            <!-- New mode: dropdown chọn course -->
                            <div th:if="${enrollmentForm.id == null}">
                                <select th:field="*{courseId}" class="form-select form-select-sm" required>
                                    <option value="">Selected Course Title</option>
                                    <option th:each="c : ${courses}"
                                            th:value="${c.id}"
                                            th:text="${c.title}">
                                    </option>
                                </select>
                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('courseId')}"
                                     th:errors="*{courseId}"></div>
                            </div>
                        </div>
                        <div class="col-5">
                            <label class="form-label small fw-medium">Fee *</label>
                            <input type="number" step="0.01" min="0"
                                   th:field="*{fee}"
                                   class="form-control form-control-sm"
                                   placeholder="0.00">
                        </div>
                    </div>

                    <!-- Row 2: Username or Email + Full Name -->
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label small fw-medium">Username or Email *</label>
                            <input type="text"
                                   th:field="*{usernameOrEmail}"
                                   class="form-control form-control-sm"
                                   th:attr="readonly=${enrollmentForm.id != null}"
                                   th:classappend="${enrollmentForm.id != null} ? 'bg-light' : ''"
                                   placeholder="">
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-medium">Full Name *</label>
                            <input type="text"
                                   th:field="*{fullName}"
                                   class="form-control form-control-sm"
                                   placeholder="">
                        </div>
                    </div>

                    <!-- Enroll Reason -->
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Enroll Reason</label>
                        <textarea th:field="*{enrollNote}"
                                  class="form-control form-control-sm"
                                  rows="3"
                                  style="resize:vertical;"></textarea>
                    </div>

                    <!-- Row 3: Status (radio) + Last Updated -->
                    <div class="row g-3 mb-3">
                        <div class="col-7">
                            <label class="form-label small fw-medium d-block">Status</label>
                            <div class="d-flex gap-4 mt-1">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           th:field="*{status}"
                                           th:value="PENDING"
                                           id="statusPending">
                                    <label class="form-check-label small" for="statusPending">Pending</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           th:field="*{status}"
                                           th:value="APPROVED"
                                           id="statusApproved">
                                    <label class="form-check-label small" for="statusApproved">Approved</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           th:field="*{status}"
                                           th:value="REJECTED"
                                           id="statusRejected">
                                    <label class="form-check-label small" for="statusRejected">Rejected</label>
                                </div>
                            </div>
                        </div>
                        <div class="col-5">
                            <label class="form-label small fw-medium">Last Updated</label>
                            <input type="text" class="form-control form-control-sm bg-light"
                                   th:value="${enrollmentForm.updatedAt != null ?
                                           #temporals.format(enrollmentForm.updatedAt,'yyyy-MM-dd HH:mm') : ''}"
                                   readonly>
                        </div>
                    </div>

                    <!-- Rejected Notes (hiện khi status = REJECTED) -->
                    <div class="mb-3" id="rejectedNotesSection"
                         th:style="${enrollmentForm.status != null and enrollmentForm.status.name() eq 'REJECTED'} ? 'display:block' : 'display:none'">
                        <label class="form-label small fw-medium">Rejected Notes</label>
                        <textarea th:field="*{rejectedNotes}"
                                  class="form-control form-control-sm"
                                  rows="3"
                                  placeholder="Nhập lý do từ chối..."
                                  style="resize:vertical;"></textarea>
                    </div>

                    <!-- Row 4: Progress + Completed At -->
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <label class="form-label small fw-medium">Progress</label>
                            <input type="number" step="0.01" min="0" max="100"
                                   th:field="*{progress}"
                                   class="form-control form-control-sm"
                                   placeholder="0.00">
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-medium">Completed At</label>
                            <input type="datetime-local"
                                   th:field="*{completedAt}"
                                   class="form-control form-control-sm">
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary btn-sm px-4">
                        Submit
                    </button>
                    <a th:href="@{/admin/enrollments}"
                       class="btn btn-light btn-sm px-4 ms-2">
                        Cancel
                    </a>

                </form>
            </div>
        </div>

    </div>

    <script>
        // Hiện/ẩn Rejected Notes khi chọn status radio
        document.querySelectorAll('input[name="status"]').forEach(radio => {
            radio.addEventListener('change', function () {
                document.getElementById('rejectedNotesSection').style.display =
                    this.value === 'REJECTED' ? 'block' : 'none';
            });
        });
    </script>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
