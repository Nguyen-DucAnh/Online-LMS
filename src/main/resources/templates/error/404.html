<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>404 - Not Found | OLMS</title>
    <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #f59e0b;
            line-height: 1;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body class="bg-light">
    <div class="error-container">
        <div class="card p-5 shadow-lg border-0 rounded-4" style="max-width: 640px;">
            <div class="error-code">404</div>
            <h3 class="fw-700 mb-3">Resource Not Found</h3>
            <p class="text-muted mb-4">
                The lesson or course cannot be opened right now. It may be unavailable or you may not have access.
            </p>
            <div th:if="${message}" class="alert alert-warning text-start small mb-4">
                <strong>Details:</strong> <span th:text="${message}"></span>
            </div>
            <a th:href="@{/my-enrollments}" class="btn btn-outline-primary px-4 py-2 fw-600 me-2">
                <i class="fas fa-clipboard-list me-2"></i>My Enrollments
            </a>
            <a th:href="@{/}" class="btn btn-outline-secondary px-4 py-2 fw-600">
                <i class="fas fa-home me-2"></i>Back to Home
            </a>
        </div>
    </div>
</body>

</html>
