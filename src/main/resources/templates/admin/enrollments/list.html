<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Course Enrollments | Online LMS</title>
    <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
</head>

<body>

<!-- Sidebar -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- Topbar -->
<div class="topbar">
    <div class="fw-semibold">Enrollment Management</div>

    <div class="dropdown">
        <button class="btn btn-sm d-flex align-items-center gap-2"
                data-bs-toggle="dropdown">
            <i class="fas fa-user-circle"></i>
            <span sec:authentication="name">Admin</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" th:href="@{/user/profile}">Profile</a></li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <button class="dropdown-item text-danger">Logout</button>
                </form>
            </li>
        </ul>
    </div>
</div>

<!-- Main Content -->
<main class="main">

    <div class="container-fluid py-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Course Enrollments</h4>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary btn-sm"
                        data-bs-toggle="modal" data-bs-target="#importModal">
                    <i class="fas fa-file-import me-1"></i>Import
                </button>

                <a th:href="@{/admin/enrollments/export(courseId=${selectedCourseId},status=${selectedStatus})}"
                   class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-file-export me-1"></i>Export
                </a>

                <a th:href="@{/admin/enrollments/new}"
                   class="btn btn-primary btn-sm">
                    <i class="fas fa-plus me-1"></i>+ Add New
                </a>
            </div>
        </div>

        <!-- Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Filter -->
        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body py-3">
                <form th:action="@{/admin/enrollments}" method="get" class="row g-2 align-items-end">

                    <div class="col-md-3">
                        <select name="courseId" class="form-select form-select-sm">
                            <option value="">All Courses</option>
                            <option th:each="c : ${courses}"
                                    th:value="${c.id}"
                                    th:text="${c.title}"
                                    th:selected="${c.id == selectedCourseId}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <select name="userId" class="form-select form-select-sm">
                            <option value="">All Users</option>
                            <option th:each="u : ${users}"
                                    th:value="${u.id}"
                                    th:text="${u.fullName + ' (' + u.email + ')'}"
                                    th:selected="${u.id == selectedUserId}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <select name="status" class="form-select form-select-sm">
                            <option value="">All</option>
                            <option th:each="s : ${statuses}"
                                    th:value="${s.name()}"
                                    th:text="${s.name()}"
                                    th:selected="${s.name() == selectedStatus}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <div class="input-group input-group-sm">
                            <input type="text" name="keyword"
                                   th:value="${keyword}"
                                   class="form-control"
                                   placeholder="Full Name, Email, Course">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-search text-muted small"></i>
                            </span>
                        </div>
                    </div>

                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary btn-sm w-100">
                            <i class="fas fa-filter me-1"></i>Filter
                        </button>
                    </div>

                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-3 py-3 small">ID</th>
                        <th class="py-3 small">Course</th>
                        <th class="py-3 small">User Info</th>
                        <th class="py-3 small">Enrolled At</th>
                        <th class="py-3 small">Status</th>
                        <th class="py-3 small">Progress</th>
                        <th class="pe-3 py-3 small">Actions</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:if="${enrollments.empty}">
                        <td colspan="7" class="text-center py-5 text-muted">
                            Không có enrollment nào.
                        </td>
                    </tr>

                    <tr th:each="e : ${enrollments.content}">

                        <td class="ps-3 small" th:text="${e.id}"></td>

                        <td>
                            <div class="fw-medium small" th:text="${e.courseTitle}"></div>
                            <div class="text-muted" style="font-size:11px;">
                                Fee($): <span th:text="${e.fee}"></span>
                            </div>
                        </td>

                        <td>
                            <div class="small fw-medium" th:text="${e.fullName}"></div>
                            <div class="text-muted" style="font-size:11px;" th:text="${e.email}"></div>
                        </td>

                        <td class="small"
                            th:text="${#temporals.format(e.enrollDate,'yyyy-MM-dd HH:mm')}">
                        </td>

                        <td>
                            <span th:text="${e.status}" class="badge bg-secondary"></span>
                        </td>

                        <td th:text="${e.progress}" class="small"></td>

                        <td class="pe-3">
                            <div class="d-flex gap-1">

                                <a th:href="@{/admin/enrollments/{id}/edit(id=${e.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-edit"></i>
                                </a>

                                <form th:action="@{/admin/enrollments/{id}/delete(id=${e.id})}"
                                      method="post"
                                      onsubmit="return confirm('Delete?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-outline-danger">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>

                            </div>
                        </td>

                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer bg-white border-0 py-3"
                 th:if="${enrollments.totalPages > 1}">
                <nav>
                    <ul class="pagination pagination-sm justify-content-center mb-0">

                        <!-- Previous -->
                        <li class="page-item"
                            th:classappend="${enrollments.first ? 'disabled' : ''}">
                            <a class="page-link"
                               th:href="@{/admin/enrollments(
                        page=${enrollments.number-1},
                        courseId=${selectedCourseId},
                        userId=${selectedUserId},
                        status=${selectedStatus},
                        keyword=${keyword}
                   )}">
                                &laquo;
                            </a>
                        </li>

                        <!-- Page numbers -->
                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, enrollments.totalPages - 1)}"
                            th:classappend="${i == enrollments.number ? 'active' : ''}">
                            <a class="page-link"
                               th:href="@{/admin/enrollments(
                        page=${i},
                        courseId=${selectedCourseId},
                        userId=${selectedUserId},
                        status=${selectedStatus},
                        keyword=${keyword}
                   )}"
                               th:text="${i + 1}">
                            </a>
                        </li>

                        <!-- Next -->
                        <li class="page-item"
                            th:classappend="${enrollments.last ? 'disabled' : ''}">
                            <a class="page-link"
                               th:href="@{/admin/enrollments(
                        page=${enrollments.number+1},
                        courseId=${selectedCourseId},
                        userId=${selectedUserId},
                        status=${selectedStatus},
                        keyword=${keyword}
                   )}">
                                &raquo;
                            </a>
                        </li>

                    </ul>
                </nav>
            </div>
        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
