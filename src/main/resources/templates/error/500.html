<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>500 - Server Error | OLMS</title>
    <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #ef4444;
            line-height: 1;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body class="bg-light">
    <div class="error-container">
        <div class="card p-5 shadow-lg border-0 rounded-4" style="max-width: 600px;">
            <div class="error-code">500</div>
            <h3 class="fw-700 mb-3">Internal Server Error</h3>
            <p class="text-muted mb-4">
                Something went wrong on our end. Please try again later or contact support.
            </p>
            <div th:if="${error}" class="alert alert-danger text-start small mb-4">
                <strong>Details:</strong> <span th:text="${message}"></span>
            </div>
            <a th:href="@{/}" class="btn btn-outline-secondary px-4 py-2 fw-600">
                <i class="fas fa-home me-2"></i>Back to Home
            </a>
        </div>
    </div>
</body>

</html>
