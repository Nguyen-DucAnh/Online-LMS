<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title th:text="${chapter.id == null ? 'Thêm chương' : 'Sửa chương'} + ' | OLMS'">Chapter Details</title>
  <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
</head>
<body class="bg-light">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="topbar">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb mb-0 small">
      <li class="breadcrumb-item"><a th:href="@{/admin/courses}" class="text-decoration-none text-muted">Khóa học</a></li>
      <li class="breadcrumb-item"><a th:href="@{/admin/courses/{id}/content(id=${course.id})}" class="text-decoration-none text-muted" th:text="${course.title}">Course</a></li>
      <li class="breadcrumb-item active fw-600" th:text="${chapter.id == null ? 'Thêm chương' : 'Sửa chương'}">Chapter</li>
    </ol>
  </nav>
</div>

<main class="main">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="page-title mb-0">
      <i class="fas fa-folder-open me-2" style="color:var(--purple);"></i>
      <span th:text="${chapter.id == null ? 'Thêm chương mới' : 'Sửa chương'}">Chapter Details</span>
      <span class="text-muted fw-normal small ms-2" th:text="'— ' + ${course.title}"></span>
    </h4>
    <a th:href="@{/admin/courses/{id}/content(id=${course.id})}" class="btn btn-outline-secondary btn-sm">
      <i class="fas fa-arrow-left me-1"></i>Quay lại nội dung
    </a>
  </div>

  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4">
    <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <form th:if="${chapter.id == null}"
            th:action="@{/admin/courses/{cid}/chapters/new(cid=${course.id})}"
            th:method="post" th:object="${chapter}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
          <label class="form-label">Tên chương <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{title}" required
                 placeholder="VD: Chương 1 — Giới thiệu tổng quan"/>
          <div class="text-danger small" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Mô tả</label>
          <textarea class="form-control" rows="4" th:field="*{description}"
                    placeholder="Mô tả ngắn về nội dung của chương này..."></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label">Thứ tự hiển thị <span class="text-danger">*</span></label>
          <input type="number" class="form-control" th:field="*{orderIndex}" min="1" required
                 style="max-width:120px;"/>
          <div class="form-text">Thứ tự chương xuất hiện trong khóa học</div>
        </div>
        <button type="submit" class="btn btn-purple fw-700">
          <i class="fas fa-save me-2"></i>Tạo chương
        </button>
      </form>
      <form th:unless="${chapter.id == null}"
            th:action="@{/admin/courses/{cid}/chapters/{chid}/edit(cid=${course.id}, chid=${chapter.id})}"
            th:method="post" th:object="${chapter}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
          <label class="form-label">Tên chương <span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{title}" required
                 placeholder="VD: Chương 1 — Giới thiệu tổng quan"/>
          <div class="text-danger small" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Mô tả</label>
          <textarea class="form-control" rows="4" th:field="*{description}"
                    placeholder="Mô tả ngắn về nội dung của chương này..."></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label">Thứ tự hiển thị <span class="text-danger">*</span></label>
          <input type="number" class="form-control" th:field="*{orderIndex}" min="1" required
                 style="max-width:120px;"/>
          <div class="form-text">Thứ tự chương xuất hiện trong khóa học</div>
        </div>
        <button type="submit" class="btn btn-purple fw-700">
          <i class="fas fa-save me-2"></i>Cập nhật chương
        </button>
      </form>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
