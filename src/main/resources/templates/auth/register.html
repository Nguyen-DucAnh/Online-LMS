<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>Register</title>
</head>

<body>
    <section>
        <div class="row justify-content-center mt-5">
            <div class="col-md-4">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Fullname</label>
                        <input type="text" th:field="*{fullname}" class="form-control" required>
                        <div class="text-danger" th:if="${#fields.hasErrors('fullname')}" th:errors="*{fullname}">Error
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required>
                        <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" th:field="*{phone}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" th:field="*{password}" class="form-control" required>
                        <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" th:field="*{confirmPassword}" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Register</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="/login">Already have an account? Login</a>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
