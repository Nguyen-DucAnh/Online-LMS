<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>Verify OTP</title>
</head>

<body>
    <section>
        <div class="row justify-content-center mt-5">
            <div class="col-md-4">
                <h2 class="text-center">Verify OTP</h2>
                <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/verify-otp}" th:object="${otpRequest}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">OTP Code</label>
                        <input type="text" th:field="*{otp}" class="form-control" required
                            placeholder="Enter 6-digit code">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Verify</button>
                </form>

                <div class="mt-3 text-center">
                    <a th:href="@{/resend-otp(email=${otpRequest.email})}">Resend OTP</a>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
