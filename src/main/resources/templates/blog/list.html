<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog List | OLMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    .post-item{padding:16px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;}
    .post-thumb{width:160px;height:100px;object-fit:cover;border-radius:10px;flex-shrink:0;}
    .sidebar-box{border:1px solid #e5e7eb;border-radius:10px;background:#fff;}
    .sidebar-title{background:#f3f4f6;border-bottom:1px solid #e5e7eb;padding:10px 12px;border-top-left-radius:10px;border-top-right-radius:10px;font-weight:700;}
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}">OLMS</a>
    <div class="ms-auto d-flex gap-2">
      <a class="btn btn-outline-primary" th:href="@{/login}" sec:authorize="isAnonymous()">Login</a>
      <a class="btn btn-primary" th:href="@{/register}" sec:authorize="isAnonymous()">Register</a>
      <a class="btn btn-outline-primary" th:href="@{/profile}" sec:authorize="isAuthenticated()">Profile</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="row g-4">

    <div class="col-lg-8">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h4 class="mb-0">Blog List</h4>
      </div>

      <div class="d-flex flex-column gap-3">
        <div th:if="${posts.isEmpty()}" class="text-center text-muted py-5">
          Không có bài viết.
        </div>

        <a th:each="p : ${posts.content}"
           th:href="@{/blogs/{id}(id=${p.id})}"
           class="text-decoration-none text-dark">
          <div class="post-item d-flex gap-3">
            <img th:if="${p.thumbnail != null and !#strings.isEmpty(p.thumbnail)}" th:src="${p.thumbnail}" class="post-thumb" alt="thumb"/>
            <div th:unless="${p.thumbnail != null and !#strings.isEmpty(p.thumbnail)}" class="post-thumb bg-secondary text-white d-flex align-items-center justify-content-center">IMG</div>
            <div>
              <h5 class="fw-bold mb-1" th:text="${p.title}"></h5>
              <p class="text-muted mb-1" th:text="${p.briefInfo}"></p>
              <div class="text-muted small">
                <span th:text="${p.categoryName}"></span>
                <span class="mx-2">|</span>
                <span th:text="${#temporals.format(p.createdAt, 'dd/MM/yyyy')}"></span>
              </div>
            </div>
          </div>
        </a>
      </div>

      <div class="d-flex justify-content-center mt-4" th:if="${posts.totalPages > 1}">
        <nav>
          <ul class="pagination">
            <li class="page-item" th:classappend="${posts.first} ? 'disabled' : ''">
              <a class="page-link" th:href="@{/blogs(page=${posts.number-1}, keyword=${keyword}, categoryId=${categoryId})}">&laquo;</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, posts.totalPages-1)}" th:classappend="${i==posts.number}? 'active':''">
              <a class="page-link" th:text="${i+1}" th:href="@{/blogs(page=${i}, keyword=${keyword}, categoryId=${categoryId})}"></a>
            </li>
            <li class="page-item" th:classappend="${posts.last} ? 'disabled' : ''">
              <a class="page-link" th:href="@{/blogs(page=${posts.number+1}, keyword=${keyword}, categoryId=${categoryId})}">&raquo;</a>
            </li>
          </ul>
        </nav>
      </div>

    </div>

    <div class="col-lg-4">

      <div class="sidebar-box mb-3">
        <div class="sidebar-title">Search Blog(s)</div>
        <div class="p-3">
          <form method="get" th:action="@{/blogs}">
            <input type="hidden" name="categoryId" th:value="${categoryId}"/>
            <input class="form-control" type="text" name="keyword" placeholder="Type keyword to search" th:value="${keyword}"/>
          </form>
        </div>
      </div>

      <div class="sidebar-box">
        <div class="sidebar-title">Blog Category</div>
        <div class="p-3">
          <div class="d-flex flex-column gap-2">
            <a class="text-decoration-none" th:href="@{/blogs(keyword=${keyword})}">
              <strong th:classappend="${categoryId == null}? 'text-primary':''">All</strong>
            </a>
            <a th:each="c : ${categories}" class="text-decoration-none"
               th:href="@{/blogs(categoryId=${c.id}, keyword=${keyword})}">
              <span th:text="${c.name}" th:classappend="${c.id == categoryId}? 'text-primary fw-bold':''"></span>
            </a>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
