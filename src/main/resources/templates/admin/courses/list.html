<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Quản lý Khóa học | OLMS</title>
  <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
</head>
<body class="bg-light">

<!-- Sidebar -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- ── Topbar ── -->
<div class="topbar">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb mb-0 small">
      <li class="breadcrumb-item">
        <a th:href="@{/admin/dashboard}" class="text-decoration-none text-muted">Admin</a>
      </li>
      <li class="breadcrumb-item active fw-600">Khóa học</li>
    </ol>
  </nav>
  <!-- User dropdown -->
  <div class="dropdown">
    <button class="btn btn-sm d-flex align-items-center gap-2 border-0" data-bs-toggle="dropdown">
      <div class="rounded-circle d-flex align-items-center justify-content-center text-white"
           style="width:32px;height:32px;background:var(--purple);font-size:.75rem;">
        <i class="fas fa-user"></i>
      </div>
      <span class="fw-600 d-none d-md-inline" sec:authentication="name">Admin</span>
      <i class="fas fa-chevron-down text-muted" style="font-size:.65rem;"></i>
    </button>
    <ul class="dropdown-menu dropdown-menu-end shadow-sm">
      <li><a class="dropdown-item" th:href="@{/user/profile}">
        <i class="fas fa-user me-2 text-muted"></i>Hồ sơ</a></li>
      <li><hr class="dropdown-divider"/></li>
      <li>
        <form th:action="@{/logout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="dropdown-item text-danger">
            <i class="fas fa-sign-out-alt me-2"></i>Đăng xuất
          </button>
        </form>
      </li>
    </ul>
  </div>
</div>

<!-- ── Main content ── -->
<main class="main">

  <!-- Flash message -->
  <div th:if="${successMessage}"
       class="alert alert-success alert-dismissible fade show mb-4">
    <i class="fas fa-check-circle me-2"></i>
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Page header -->
  <div class="d-flex align-items-start justify-content-between mb-4">
    <div>
      <h4 class="page-title mb-1">
        <i class="fas fa-book-open me-2" style="color:var(--purple);"></i>Quản lý Khóa học
      </h4>
      <p class="text-muted small mb-0">Xem, thêm, chỉnh sửa và xuất bản khóa học</p>
    </div>
    <a th:href="@{/admin/courses/new}" class="btn btn-purple px-4">
      <i class="fas fa-plus me-2"></i>Thêm khóa học
    </a>
  </div>

  <!-- ── Filter bar ── -->
  <div class="card mb-4">
    <div class="card-body py-3">
      <form method="get" th:action="@{/admin/courses}" class="row g-3 align-items-end">
        <!-- Keyword -->
        <div class="col-md-4">
          <label class="form-label mb-1">Tìm kiếm</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-search text-muted"></i></span>
            <input type="text" name="keyword" class="form-control"
                   placeholder="Tên khóa học..." th:value="${keyword}"/>
          </div>
        </div>
        <!-- Category -->
        <div class="col-md-3">
          <label class="form-label mb-1">Danh mục</label>
          <select name="categoryId" class="form-select">
            <option value="">— Tất cả danh mục —</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}"
                    th:selected="${cat.id == categoryId}"></option>
          </select>
        </div>
        <!-- Status -->
        <div class="col-md-2">
          <label class="form-label mb-1">Trạng thái</label>
          <select name="status" class="form-select">
            <option value="">— Tất cả —</option>
            <option th:each="s : ${courseStatuses}"
                    th:value="${s.name()}"
                    th:text="${s.name()}"
                    th:selected="${s.name() == selectedStatus}"></option>
          </select>
        </div>
        <!-- Buttons -->
        <div class="col-md-3 d-flex gap-2">
          <button type="submit" class="btn btn-purple flex-grow-1">
            <i class="fas fa-filter me-1"></i>Lọc
          </button>
          <a th:href="@{/admin/courses}" class="btn btn-outline-secondary" title="Reset">
            <i class="fas fa-rotate-left"></i>
          </a>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Data table ── -->
  <div class="card table-card">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th>Khóa học</th>
            <th>Danh mục</th>
            <th>Giảng viên</th>
            <th>Giá</th>
            <th class="text-center">Chương</th>
            <th>Trạng thái</th>
            <th>Ngày tạo</th>
            <th class="text-center">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <!-- Empty state -->
          <tr th:if="${courses.isEmpty()}">
            <td colspan="9" class="text-center py-5 text-muted">
              <i class="fas fa-inbox fa-2x d-block mb-2" style="color:#d1d5db;"></i>
              Chưa có khóa học nào. <a th:href="@{/admin/courses/new}">Tạo ngay?</a>
            </td>
          </tr>
          <!-- Rows -->
          <tr th:each="course : ${courses.content}">
            <td class="text-muted fw-600" th:text="${course.id}"></td>
            <!-- Title + thumbnail -->
            <td>
              <div class="d-flex align-items-center gap-3">
                <img th:if="${course.thumbnail != null and !#strings.isEmpty(course.thumbnail)}"
                     th:src="${course.thumbnail}" alt="thumbnail"
                     style="width:58px;height:38px;object-fit:cover;border-radius:5px;flex-shrink:0;"/>
                <div class="rounded bg-secondary d-flex align-items-center justify-content-center text-white"
                     th:unless="${course.thumbnail != null and !#strings.isEmpty(course.thumbnail)}"
                     style="width:58px;height:38px;font-size:.6rem;flex-shrink:0;">IMG</div>
                <div>
                  <div class="fw-600" style="max-width:230px;line-height:1.3;"
                       th:text="${course.title}"></div>
                  <span th:if="${course.featured}" class="badge-feat">⭐ Nổi bật</span>
                  <span class="text-muted" style="font-size:.72rem;"
                        th:text="${course.level != null ? course.level.name() : ''}"></span>
                </div>
              </div>
            </td>
            <td class="small" th:text="${course.categoryName}"></td>
            <td class="small" th:text="${course.instructorName}"></td>
            <td class="small fw-600">
              <span th:if="${course.listedPrice != null}"
                    th:text="'$' + ${course.listedPrice}"></span>
              <span th:unless="${course.listedPrice != null}" class="text-success fw-600">Free</span>
            </td>
            <td class="text-center small" th:text="${course.chapterCount}"></td>
            <td>
              <span th:if="${course.status.name() == 'PUBLISHED'}" class="badge-pub">
                <i class="fas fa-circle me-1" style="font-size:.45rem;"></i>Published
              </span>
              <span th:unless="${course.status.name() == 'PUBLISHED'}" class="badge-unpub">
                <i class="fas fa-circle me-1" style="font-size:.45rem;"></i>Unpublished
              </span>
            </td>
            <td class="small text-muted"
                th:text="${#temporals.format(course.createdAt, 'dd/MM/yyyy')}"></td>
            <!-- Actions -->
            <td>
              <div class="d-flex justify-content-center gap-1">
                <!-- Content -->
                <a th:href="@{/admin/courses/{id}/content(id=${course.id})}"
                   class="btn btn-sm btn-outline-info" title="Quản lý nội dung">
                  <i class="fas fa-layer-group"></i>
                </a>
                <!-- Edit -->
                <a th:href="@{/admin/courses/{id}/edit(id=${course.id})}"
                   class="btn btn-sm btn-outline-secondary" title="Chỉnh sửa">
                  <i class="fas fa-pen"></i>
                </a>
                <!-- Toggle status -->
                <form th:action="@{/admin/courses/{id}/toggle-status(id=${course.id})}"
                      method="post" class="d-inline">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-sm"
                          th:classappend="${course.status.name() == 'PUBLISHED'}
                                          ? 'btn-outline-warning' : 'btn-outline-success'"
                          th:title="${course.status.name() == 'PUBLISHED'} ? 'Unpublish' : 'Publish'">
                    <i class="fas"
                       th:classappend="${course.status.name() == 'PUBLISHED'} ? 'fa-eye-slash' : 'fa-eye'"></i>
                  </button>
                </form>
                <!-- Delete (Admin only) -->
                <form sec:authorize="hasRole('ADMIN')"
                      th:action="@{/admin/courses/{id}/delete(id=${course.id})}"
                      method="post" class="d-inline"
                      th:onsubmit="return confirm('Xóa khóa học \'' + ${course.title} + '\'?')">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa">
                    <i class="fas fa-trash"></i>
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination footer -->
    <div class="card-footer bg-white border-top d-flex align-items-center justify-content-between py-3"
         th:if="${courses.totalPages > 1}">
      <small class="text-muted">
        Hiển thị <strong th:text="${courses.numberOfElements}"></strong>
        / <strong th:text="${courses.totalElements}"></strong> khóa học
      </small>
      <nav>
        <ul class="pagination pagination-sm mb-0 gap-1">
          <li class="page-item" th:classappend="${courses.first} ? 'disabled' : ''">
            <a class="page-link rounded"
               th:href="@{/admin/courses(page=${courses.number - 1},
                            keyword=${keyword}, categoryId=${categoryId}, status=${selectedStatus})}">
              <i class="fas fa-chevron-left"></i>
            </a>
          </li>
          <li class="page-item"
              th:each="i : ${#numbers.sequence(0, courses.totalPages - 1)}"
              th:classappend="${i == courses.number} ? 'active' : ''">
            <a class="page-link rounded" th:text="${i + 1}"
               th:href="@{/admin/courses(page=${i},
                            keyword=${keyword}, categoryId=${categoryId}, status=${selectedStatus})}"></a>
          </li>
          <li class="page-item" th:classappend="${courses.last} ? 'disabled' : ''">
            <a class="page-link rounded"
               th:href="@{/admin/courses(page=${courses.number + 1},
                            keyword=${keyword}, categoryId=${categoryId}, status=${selectedStatus})}">
              <i class="fas fa-chevron-right"></i>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
