<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title th:text="${lesson.id == null ? 'Thêm bài học' : 'Sửa bài học'} + ' | OLMS'">Lesson Details</title>
  <th:block th:replace="~{fragments/layout :: commonHead}"></th:block>
</head>
<body class="bg-light">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="topbar">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb mb-0 small">
      <li class="breadcrumb-item"><a th:href="@{/admin/courses}" class="text-decoration-none text-muted">Khóa học</a></li>
      <li class="breadcrumb-item"><a th:href="@{/admin/courses/{id}/content(id=${course.id})}" class="text-decoration-none text-muted" th:text="${course.title}">Course</a></li>
      <li class="breadcrumb-item active fw-600" th:text="${chapter.title}">Chapter</li>
    </ol>
  </nav>
</div>

<main class="main">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="page-title mb-0">
      <i class="fas fa-play-circle me-2" style="color:var(--purple);"></i>
      <span th:text="${lesson.id == null ? 'Thêm bài học' : 'Sửa bài học'}">Lesson Details</span>
      <span class="text-muted fw-normal small ms-2" th:text="'— ' + ${chapter.title}"></span>
    </h4>
    <a th:href="@{/admin/courses/{id}/content(id=${course.id})}" class="btn btn-outline-secondary btn-sm">
      <i class="fas fa-arrow-left me-1"></i>Quay lại nội dung
    </a>
  </div>

  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4">
    <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger mb-4">
    <div th:each="err : ${#fields.errors('*')}" th:text="${err}"></div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <form th:if="${lesson.id == null}"
            th:action="@{/admin/courses/{cid}/chapters/{chid}/lessons/new(cid=${course.id}, chid=${chapter.id})}"
            th:method="post" th:object="${lesson}" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Tên bài học <span class="text-danger">*</span></label>
            <input type="text" class="form-control" th:field="*{title}" required placeholder="VD: Bài 1 — Giới thiệu"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
          </div>
          <div class="col-md-2">
            <label class="form-label">Thời lượng (phút)</label>
            <input type="number" class="form-control" th:field="*{duration}" min="0"/>
          </div>
          <div class="col-md-2">
            <label class="form-label">Thứ tự <span class="text-danger">*</span></label>
            <input type="number" class="form-control" th:field="*{orderIndex}" min="1" required/>
          </div>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label class="form-label">Loại nội dung <span class="text-danger">*</span></label>
            <select class="form-select" th:field="*{type}" id="contentType">
              <option th:each="lt : ${lessonTypes}" th:value="${lt}" th:text="${lt.name()}"></option>
            </select>
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" th:field="*{previewEnabled}" id="previewEnabled"/>
              <label class="form-check-label" for="previewEnabled">Bài học xem trước (không cần đăng ký)</label>
            </div>
          </div>
        </div>
        <div class="mb-3" id="videoUploadGroup">
          <label class="form-label">Upload video từ máy <span class="text-danger">*</span></label>
          <input type="file" name="videoFile" class="form-control" accept="video/*"/>
          <div class="form-text">Chọn file video từ máy tính (mp4, webm, ...)</div>
        </div>
        <div class="mb-3" id="pdfUploadGroup">
          <label class="form-label">Upload PDF từ máy <span class="text-danger">*</span></label>
          <input type="file" name="pdfFile" class="form-control" accept="application/pdf"/>
          <div class="form-text">Chọn file PDF từ máy tính</div>
        </div>
        <div class="mb-4" id="richTextGroup">
          <label class="form-label">Nội dung bài học (rich text)</label>
          <textarea class="form-control" rows="8" th:field="*{content}" placeholder="Nhập nội dung bài học..."></textarea>
        </div>
        <button type="submit" class="btn btn-purple fw-700"><i class="fas fa-save me-2"></i>Tạo bài học</button>
      </form>
      <form th:unless="${lesson.id == null}"
            th:action="@{/admin/courses/{cid}/chapters/{chid}/lessons/{lid}/edit(cid=${course.id}, chid=${chapter.id}, lid=${lesson.id})}"
            th:method="post" th:object="${lesson}" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Tên bài học <span class="text-danger">*</span></label>
            <input type="text" class="form-control" th:field="*{title}" required placeholder="VD: Bài 1 — Giới thiệu"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
          </div>
          <div class="col-md-2">
            <label class="form-label">Thời lượng (phút)</label>
            <input type="number" class="form-control" th:field="*{duration}" min="0"/>
          </div>
          <div class="col-md-2">
            <label class="form-label">Thứ tự <span class="text-danger">*</span></label>
            <input type="number" class="form-control" th:field="*{orderIndex}" min="1" required/>
          </div>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label class="form-label">Loại nội dung <span class="text-danger">*</span></label>
            <select class="form-select" th:field="*{type}" id="contentType2">
              <option th:each="lt : ${lessonTypes}" th:value="${lt}" th:text="${lt.name()}"></option>
            </select>
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" th:field="*{previewEnabled}" id="previewEnabled2"/>
              <label class="form-check-label" for="previewEnabled2">Bài học xem trước (không cần đăng ký)</label>
            </div>
          </div>
        </div>
        <div class="mb-3" id="videoUploadGroup2">
          <label class="form-label">Upload video từ máy</label>
          <input type="file" name="videoFile" class="form-control" accept="video/*"/>
          <div th:if="${lesson.contentFilePath != null and lesson.type.name() == 'VIDEO'}" class="form-text">
            File hiện tại: <a th:href="${lesson.contentFilePath}" target="_blank">Xem video</a>
          </div>
          <div class="form-text">Để thay đổi, chọn file mới. Bỏ trống nếu giữ nguyên.</div>
        </div>
        <div class="mb-3" id="pdfUploadGroup2">
          <label class="form-label">Upload PDF từ máy</label>
          <input type="file" name="pdfFile" class="form-control" accept="application/pdf"/>
          <div th:if="${lesson.contentFilePath != null and lesson.type.name() == 'PDF'}" class="form-text">
            File hiện tại: <a th:href="${lesson.contentFilePath}" target="_blank">Xem PDF</a>
          </div>
          <div class="form-text">Để thay đổi, chọn file mới. Bỏ trống nếu giữ nguyên.</div>
        </div>
        <div class="mb-4" id="richTextGroup2">
          <label class="form-label">Nội dung bài học (rich text)</label>
          <textarea class="form-control" rows="8" th:field="*{content}" placeholder="Nhập nội dung bài học..."></textarea>
        </div>
        <button type="submit" class="btn btn-purple fw-700"><i class="fas fa-save me-2"></i>Cập nhật bài học</button>
      </form>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  (function() {
    function init(id) {
      var typeSelect = document.getElementById('contentType' + (id ? id : ''));
      var videoGroup = document.getElementById('videoUploadGroup' + (id ? id : ''));
      var pdfGroup = document.getElementById('pdfUploadGroup' + (id ? id : ''));
      var textGroup = document.getElementById('richTextGroup' + (id ? id : ''));
      if (!typeSelect) return;
      function toggle() {
        var v = typeSelect.value;
        if (videoGroup) videoGroup.style.display = v === 'VIDEO' ? 'block' : 'none';
        if (pdfGroup) pdfGroup.style.display = v === 'PDF' ? 'block' : 'none';
        if (textGroup) textGroup.style.display = v === 'TEXT' ? 'block' : 'none';
      }
      typeSelect.addEventListener('change', toggle);
      toggle();
    }
    document.addEventListener('DOMContentLoaded', function() {
      init('');
      init('2');
    });
  })();
</script>
</body>
</html>
